<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="-66 -74 138 136" version="1.1"
   xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    .usercard-body { fill:#f4e7cf; stroke:#4a3b28; stroke-width:4; }
    .usercard-pin { stroke:#111; stroke-width:5; stroke-linecap:round; fill:none; }
    .arith-gate-pin-letter { font-family:Arial,sans-serif; font-size:20px; font-weight:800; fill:#2c2113; text-anchor:middle; }
    .splitter-bar { fill:#111; stroke:none; }
    .splitter-stripe { stroke:#d8d8d8; stroke-width:3; stroke-dasharray:6 3; stroke-linecap:butt; fill:none; }
    .splitter-width-label { fill:#ffe37a; font-family:Arial,sans-serif; font-weight:800; font-size:13px; text-anchor:middle; }
  </style>
  <!-- Pins first, then the body ON TOP so pins don't appear to enter the body. -->
  <rect class="splitter-bar" x="-62" y="-49.166668" width="16" height="18.333334" />
  <line class="splitter-stripe" x1="-59" y1="-40" x2="-49" y2="-40" style="stroke-width:5;stroke-dasharray:10, 5" />
  <rect class="splitter-bar" x="-62" y="-9.166667" width="16" height="18.333334" />
  <line class="splitter-stripe" x1="-59" y1="0" x2="-49" y2="0" style="stroke-width:5;stroke-dasharray:10, 5" />
  <rect class="splitter-bar" x="-62" y="30.833334" width="16" height="18.333334" />
  <line class="splitter-stripe" x1="-59" y1="40" x2="-49" y2="40" style="stroke-width:5;stroke-dasharray:10, 5" />
  <rect class="splitter-bar" x="46" y="-9.166667" width="20" height="18.333334" />
  <line class="splitter-stripe" x1="49" y1="0" x2="63" y2="0" style="stroke-width:5;stroke-dasharray:10, 5" />
  <!-- Control bus (7 bits): tall like the side pins, connection at its top tip. -->
  <rect class="splitter-bar" x="-9.166667" y="-58" width="18.333334" height="20" />
  <line class="splitter-stripe" x1="0" y1="-55" x2="0" y2="-43" style="stroke-width:5;stroke-dasharray:10, 5" />
  <path class="usercard-body"
     d="m -46,-54 92,24 V 30 L -46,54 V 24.833334 l 9.363472,-10.569374 -9.255514,0.07899 -0.131137,-29.078194 8.748967,-0.248527 L -46,-24.833334 Z" />
  <text class="arith-gate-pin-letter" x="6" y="6" text-anchor="middle" style="font-size:16px">ALU2</text>
  <text class="splitter-width-label" x="-59.28" y="-50.699" text-anchor="middle" style="font-size:21.6667px">16</text>
  <text class="splitter-width-label" x="-59.28" y="-10.699" text-anchor="middle" style="font-size:21.6667px">16</text>
