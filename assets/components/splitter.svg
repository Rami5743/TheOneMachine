<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Splitter (מפצל): a black spine with an input bus on one side and equal
     output buses on the other. Same simple 45° stripe pattern as the bus.
     Reference look (4 outputs); the board draws it dynamically. Editable. -->
<svg viewBox="-66 -52 154 104" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd">
  <style id="style1">
    .bar    { fill: #111; stroke: none; }
    .stripe { stroke: #d8d8d8; stroke-width: 2.5; stroke-linecap: round; fill: none; }
  </style>
  <rect class="bar" x="-7" y="-44" width="14" height="88" />
  <rect class="bar" x="-64" y="-6" width="57" height="11" />
  <line class="stripe" x1="-60" y1="6" x2="-49" y2="-6" />
  <line class="stripe" x1="-49" y1="6" x2="-38" y2="-6" />
  <line class="stripe" x1="-38" y1="6" x2="-27" y2="-6" />
  <line class="stripe" x1="-27" y1="6" x2="-16" y2="-6" />
  <rect class="bar" x="7" y="-38" width="55" height="11" />
  <line class="stripe" x1="11" y1="-28" x2="22" y2="-38" />
  <line class="stripe" x1="22" y1="-28" x2="33" y2="-38" />
  <line class="stripe" x1="33" y1="-28" x2="44" y2="-38" />
  <line class="stripe" x1="44" y1="-28" x2="55" y2="-38" />
  <rect class="bar" x="7" y="-16" width="55" height="11" />
  <line class="stripe" x1="11" y1="-6" x2="22" y2="-16" />
  <line class="stripe" x1="22" y1="-6" x2="33" y2="-16" />
  <line class="stripe" x1="33" y1="-6" x2="44" y2="-16" />
  <line class="stripe" x1="44" y1="-6" x2="55" y2="-16" />
  <rect class="bar" x="7" y="6" width="55" height="11" />
  <line class="stripe" x1="11" y1="16" x2="22" y2="6" />
  <line class="stripe" x1="22" y1="16" x2="33" y2="6" />
  <line class="stripe" x1="33" y1="16" x2="44" y2="6" />
  <line class="stripe" x1="44" y1="16" x2="55" y2="6" />
  <rect class="bar" x="7" y="28" width="55" height="11" />
  <line class="stripe" x1="11" y1="38" x2="22" y2="28" />
  <line class="stripe" x1="22" y1="38" x2="33" y2="28" />
  <line class="stripe" x1="33" y1="38" x2="44" y2="28" />
  <line class="stripe" x1="44" y1="38" x2="55" y2="28" />
  <g id="pin-tags" data-role="pin-tags" opacity="0" pointer-events="none">
    <circle data-pin="in" cx="-64" cy="0" r="0" />
    <circle data-pin="out0" cx="62" cy="-33" r="0" />
    <circle data-pin="out1" cx="62" cy="-11" r="0" />
