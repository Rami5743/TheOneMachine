         y="232.85619"
         id="tspan4"
         style="stroke-width:1.1005">האן ושטרסמן עשו ניסויים</tspan><tspan
         x="196.7048"
         y="263.49414"
         id="tspan5"
         style="stroke-width:1.1005">עם אורניום, שהוכיחו שהוא</tspan><tspan
