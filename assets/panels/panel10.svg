         y="294.1431"
         id="tspan6"
         style="stroke-width:1.1005">מתבקע.</tspan><tspan
         x="196.7048"
         y="324.78101"
         id="tspan7"
         style="stroke-width:1.1005">הייזנברג חושב על זה.</tspan><tspan
         x="196.7048"
         y="355.41898"
         id="tspan8"
         style="stroke-width:1.1005">נילס בור כתב לי שהייזנברג</tspan><tspan
         x="196.7048"
         y="386.06787"
         id="tspan9"
