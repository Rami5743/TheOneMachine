       xml:space="preserve"
       x="110.29569"
       y="8.3908844"
       style="stroke-width:0.922055"><tspan
         x="959.50824"
         y="134.05222"
         id="tline1"
         style="stroke-width:0.922055">פעולת החשבון הכי בסיסית היא חיבור. אנחנו רוצים לבנות</tspan><tspan
         x="959.50824"
         y="187.53139"
         id="tline2"
         style="stroke-width:0.922055">כרטיס שמחבר 2 מספרים. הוא יקבל 2 בסים של 16 ביטים</tspan><tspan
         x="959.50824"
         y="241.01057"
         id="tline3"
         style="stroke-width:0.922055">(שמייצגים 2 מספרים) ויוציא בס של 16 ביטים (שמייצג את</tspan><tspan
         x="959.50824"
         y="294.48975"
         id="tline4"
         style="stroke-width:0.922055">הסכום שלהם). אנחנו נעשה את זה בדיוק כמו שאתה עשית</tspan><tspan
         x="959.50824"
         y="347.96893"
         id="tline5"
         style="stroke-width:0.922055">כשחישבת סכום של 2 מספרים בטור. השלב הבסיסי הוא לחבר</tspan><tspan
         x="959.50824"
         y="401.44812"
         id="tline6"
         style="stroke-width:0.922055">2 ספרות. שים לב שהתוצאה יכולה להיות דו ספרתית. יש לה</tspan><tspan
         x="959.50824"
         y="454.92731"
         id="tline7"
         style="stroke-width:0.922055">ספרת אחדות וספרת 2. בספרת האחדות נשתמש כמו שהיא, ואת</tspan><tspan
         x="959.50824"
         y="508.40649"
         id="tline8"
         style="stroke-width:0.922055">ספרת ה-2 נעביר הלאה לספרה הבאה. קוראים לספרה</tspan><tspan
         x="959.50824"
         y="561.88568"
         id="tline9"
         style="stroke-width:0.922055">שמעבירים הלאה נשיאה ובאנגלית carry.</tspan></text>
