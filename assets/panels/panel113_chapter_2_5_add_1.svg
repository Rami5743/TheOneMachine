       font-weight="400"
       fill="#000000"
       stroke="none"
       xml:space="preserve"><tspan x="921" y="136.284" id="tline1">פעולת החשבון הכי בסיסית היא חיבור. אנחנו רוצים לבנות</tspan><tspan x="921" y="194.284" id="tline2">כרטיס שמחבר 2 מספרים. הוא יקבל 2 בסים של 16 ביטים</tspan><tspan x="921" y="252.284" id="tline3">(שמייצגים 2 מספרים) ויוציא בס של 16 ביטים (שמייצג את</tspan><tspan x="921" y="310.284" id="tline4">הסכום שלהם). אנחנו נעשה את זה בדיוק כמו שאתה עשית</tspan><tspan x="921" y="368.284" id="tline5">כשחישבת סכום של 2 מספרים בטור. השלב הבסיסי הוא לחבר</tspan><tspan x="921" y="426.284" id="tline6">2 ספרות. שים לב שהתוצאה יכולה להיות דו ספרתית. יש לה</tspan><tspan x="921" y="484.284" id="tline7">ספרת אחדות וספרת 2. בספרת האחדות נשתמש כמו שהיא, ואת</tspan><tspan x="921" y="542.284" id="tline8">ספרת ה-2 נעביר הלאה לספרה הבאה. קוראים לספרה</tspan><tspan x="921" y="600.284" id="tline9">שמעבירים הלאה נשיאה ובאנגלית carry.</tspan></text>
