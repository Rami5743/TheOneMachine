<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="1448" height="1086" viewBox="0 0 1448 1086" preserveAspectRatio="xMidYMid meet" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg">
  <defs id="defs1" />
  <image id="raster-base" x="0" y="0" width="1448" height="1086" preserveAspectRatio="none" href="panel106_chapter_2_5_workshop_vn.jpg" xlink:href="panel106_chapter_2_5_workshop_vn.jpg" />
  <g id="text-bubble-layer" inkscape:groupmode="layer" inkscape:label="Text bubble">
    <path id="speech-bubble" d="M 228,45 H 1220 A 28 28 0 0 1 1248,73 V 585 A 28 28 0 0 1 1220,613 H 620 L 560,691 L 500,613 H 228 A 28 28 0 0 1 200,585 V 73 A 28 28 0 0 1 228,45 Z" fill="#ffffff" stroke="#000000" stroke-width="4.2" stroke-linejoin="round" stroke-linecap="round" />
    <text id="bubble-text" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="'Noto Sans Hebrew', Arial, sans-serif" font-size="40px" font-weight="400" fill="#000000" stroke="none" xml:space="preserve"><tspan x="724" y="105" id="tline1">פעולת החשבון הכי בסיסית היא חיבור. אנחנו רוצים לבנות</tspan><tspan x="724" y="163" id="tline2">כרטיס שמחבר 2 מספרים. הוא יקבל 2 בסים של 16 ביטים</tspan><tspan x="724" y="221" id="tline3">(שמייצגים 2 מספרים) ויוציא בס של 16 ביטים (שמייצג את</tspan><tspan x="724" y="279" id="tline4">הסכום שלהם). אנחנו נעשה את זה בדיוק כמו שאתה עשית</tspan><tspan x="724" y="337" id="tline5">כשחישבת סכום של 2 מספרים בטור. השלב הבסיסי הוא לחבר</tspan><tspan x="724" y="395" id="tline6">2 ספרות. שים לב שהתוצאה יכולה להיות דו ספרתית. יש לה</tspan><tspan x="724" y="453" id="tline7">ספרת אחדות וספרת 2. בספרת האחדות נשתמש כמו שהיא, ואת</tspan><tspan x="724" y="511" id="tline8">ספרת ה-2 נעביר הלאה לספרה הבאה. קוראים לספרה</tspan><tspan x="724" y="569" id="tline9">שמעבירים הלאה נשיאה ובאנגלית carry.</tspan></text>
  </g>
</svg>
