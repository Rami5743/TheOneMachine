       fill="#000000"
       stroke="none"
       xml:space="preserve"
       style="stroke-width:1.0575"> <tspan
   x="786.06238"
   y="150.78989"
   id="tspan1"
   style="stroke-width:1.0575">אנחנו?! אתה מתכוון לממשלה?</tspan> <tspan
   x="786.06238"
   y="179.87105"
   id="tspan2"
   style="stroke-width:1.0575">הדבר שאתה מדבר עליו יכול ליצור</tspan> <tspan
   x="786.06238"
   y="208.95221"
   id="tspan3"
   style="stroke-width:1.0575">פצצה יותר חזקה מכל הפצצות</tspan> <tspan
   x="786.06238"
   y="238.03337"
   id="tspan4"
   style="stroke-width:1.0575">בעולם ביחד.</tspan> <tspan
   x="786.06238"
   y="267.11456"
   id="tspan5"
   style="stroke-width:1.0575">אי אפשר לסמוך על אף ממשלה</tspan> <tspan
   x="786.06238"
   y="296.19571"
   id="tspan6"
   style="stroke-width:1.0575">להחזיק כוח כזה.</tspan> <tspan
   x="786.06238"
   y="325.27689"
   id="tspan7"
   style="stroke-width:1.0575">אני אסיר תודה למדינה על הרבה דברים,</tspan> <tspan
   x="786.06238"
   y="354.35803"
   id="tspan8"
   style="stroke-width:1.0575">אבל אני לא סומך עליה,</tspan> <tspan
   x="786.06238"
   y="383.43921"
   id="tspan9"
   style="stroke-width:1.0575">או על אף מדינה אחרת.</tspan> <tspan
   x="786.06238"
   y="412.52036"
   id="tspan10"
   style="stroke-width:1.0575">עם אנרגיה גרעינית, אני אסמוך</tspan> <tspan
   x="786.06238"
   y="441.60153"
   id="tspan11"
   style="stroke-width:1.0575">רק על ממשלה עולמית,</tspan> <tspan
   x="786.06238"
   y="470.68271"
   id="tspan12"
   style="stroke-width:1.0575">וגם אז, היא לעולם לא תפתח</tspan> <tspan
   x="786.06238"
   y="499.76385"
   id="tspan13"
   style="stroke-width:1.0575">פצצות גרעיניות.</tspan></text>
