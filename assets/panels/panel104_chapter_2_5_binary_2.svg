       unicode-bidi="plaintext"
       font-family="'Noto Sans Hebrew', Arial, sans-serif"
       font-size="29.7181px"
       font-weight="400"
       fill="#000000"
       stroke="none"
       xml:space="preserve"
       x="237.61295"
       y="-3.4795609"
       style="stroke-width:1"><tspan
         x="910.9126"
         y="68.958191"
         id="tline1"
         style="stroke-width:1">השיטה לכתוב מספרים עם ביטים נקראת השיטה הבינרית,</tspan><tspan
         x="910.9126"
         y="107.96313"
         id="tline2"
         style="stroke-width:1">כתיבה בבסיס ספירה 2. היא דומה לשיטה העשרונית שאתה</tspan><tspan
         x="910.9126"
         y="146.96808"
         id="tline3"
         style="stroke-width:1">מכיר אבל הבסיס הוא 2 במקום 10. כשכותבים בשיטה</tspan><tspan
         x="910.9126"
         y="185.97302"
         id="tline4"
         style="stroke-width:1">הבינרית הספרה הימנית ביותר היא ספרת האחדות (כמו</tspan><tspan
         x="910.9126"
         y="224.97797"
         id="tline5"
         style="stroke-width:1">בשיטה העשרונית). הספרה הבאה מימין היא ספרת ה-2,</tspan><tspan
         x="910.9126"
         y="263.98291"
         id="tline6"
         style="stroke-width:1">אחריה ספרת ה-4 אז ספרת ה-8 וכך הלאה (כל פעם</tspan><tspan
         x="910.9126"
         y="302.98785"
         id="tline7"
         style="stroke-width:1">מכפילים פי-2). כל ספרה היא בעצם ביט (היא יכולה</tspan><tspan
         x="910.9126"
         y="341.9928"
         id="tline8"
         style="stroke-width:1">להיות רק 0 או 1). למשל המספר 101 בשיטה הבינרית</tspan><tspan
         x="910.9126"
         y="380.99774"
         id="tline9"
         style="stroke-width:1">הוא 5: ה-1 הימני מייצג 1, ה-0 שאחריו מייצג 0 פעמים</tspan><tspan
         x="910.9126"
         y="420.00269"
         id="tline10"
         style="stroke-width:1">2 (שהם 0) וה-1 שאחריו מייצג 4. דוגמה נוספת היא</tspan><tspan
         x="910.9126"
         y="459.00763"
         id="tline11"
         style="stroke-width:1">המספר 111 שהוא המספר התלת-ספרתי הגדול ביותר</tspan><tspan
         x="910.9126"
         y="498.01257"
         id="tline12"
         style="stroke-width:1">בשיטה הבינרית. הוא למעשה המספר 1+2+4=7. בשביל</tspan><tspan
         x="910.9126"
         y="537.01752"
         id="tline13"
         style="stroke-width:1">לכתוב 8 יש צורך בספרה נוספת: 1000. באופן כללי</tspan><tspan
         x="910.9126"
         y="576.02246"
         id="tline14"
         style="stroke-width:1">התפקיד של כל ספרה הוא פי 2 יותר מאשר של הספרה</tspan><tspan
         x="910.9126"
         y="615.0274"
         id="tline15"
         style="stroke-width:1">הקודמת, בדיוק כמו שבשיטה העשרונית התפקיד של כל</tspan><tspan
         x="910.9126"
         y="654.03235"
         id="tline16"
         style="stroke-width:1">ספרה הוא פי-10 יותר משל הספרה הקודמת.</tspan></text>
