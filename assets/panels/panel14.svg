       fill="#000000"
       stroke="none"
       xml:space="preserve"
       style="stroke-width:0.951651"><tspan
         x="574.71124"
         y="484.10403"
         id="tspan1"
         style="stroke-width:0.951651">אתה יודע שאני שותף לחזון שלך</tspan><tspan
         x="574.71124"
         y="515.03271"
         id="tspan2"
         style="stroke-width:0.951651">של ממשלה עולמית, אבל אני מדבר</tspan><tspan
         x="574.71124"
         y="545.96136"
         id="tspan3"
         style="stroke-width:0.951651">איתך על המציאות, לא על החזון.</tspan><tspan
         x="574.71124"
         y="576.89001"
         id="tspan4"
         style="stroke-width:0.951651">אתה לימדת אותנו שהכול יחסי.</tspan><tspan
         x="574.71124"
         y="607.81866"
         id="tspan5"
         style="stroke-width:0.951651">השאלה היא לא האם אתה סומך</tspan><tspan
         x="574.71124"
         y="638.74731"
         id="tspan6"
         style="stroke-width:0.951651">על ארה״ב, אלא על מי אתה סומך יותר:</tspan><tspan
         x="574.71124"
         y="669.67596"
         id="tspan7"
         style="stroke-width:0.951651">על רוזוולט וממשלת ארצות הברית</tspan><tspan
         x="574.71124"
         y="700.60461"
         id="tspan8"
         style="stroke-width:0.951651">או על היטלר והממשלה</tspan><tspan
         x="574.71124"
         y="731.53326"
         id="tspan9"
         style="stroke-width:0.951651">של גרמניה הנאצית.</tspan><tspan
         x="574.71124"
         y="762.46191"
         id="tspan10"
         style="stroke-width:0.951651">אני לא חושב שזאת שאלה קשה...</tspan></text>
