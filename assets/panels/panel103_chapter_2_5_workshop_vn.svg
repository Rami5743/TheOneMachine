    <text id="bubble-text" text-anchor="middle" dominant-baseline="middle" direction="rtl" unicode-bidi="plaintext"
       font-family="'Noto Sans Hebrew', Arial, sans-serif" font-size="40px" font-weight="400" fill="#000000" stroke="none" xml:space="preserve"><tspan x="945" y="110" id="tline1">יש כאן כמה תרגילים על השיטה הבינרית. לפני</tspan><tspan x="945" y="170" id="tline2">שאתה מלמד את המחשב לעבוד עם השיטה</tspan><tspan x="945" y="230" id="tline3">הבינרית, כדאי שתכיר אותה טוב בעצמך.</tspan><tspan x="945" y="290" id="tline4">אני הולך עכשיו לפגוש את נילס בוהר. הוא</tspan><tspan x="945" y="350" id="tline5">הגיע מאנגליה. מזל שהוא הצליח לצאת</tspan><tspan x="945" y="410" id="tline6">מדנמרק ברגע האחרון.</tspan></text>
