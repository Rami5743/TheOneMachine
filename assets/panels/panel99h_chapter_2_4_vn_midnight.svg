       font-size="38px" font-weight="400" fill="#000000" stroke="none" xml:space="preserve"><tspan x="896" y="154">עבודה מצוינת. עכשיו כבר חצות.</tspan><tspan x="896" y="205">אתה יכול ללכת לישון. נמשיך</tspan><tspan x="896" y="256">לעבוד מחר ב-8 בבוקר. אנחנו</tspan><tspan x="896" y="307">צריכים ללמד את המחשב שלנו</tspan><tspan x="896" y="358">לעבוד עם מספרים, ולא סתם עם</tspan><tspan x="896" y="409">ביטים. אני צריך שתיזכר איך</tspan><tspan x="896" y="460">עושים פעולות חשבון עם</tspan><tspan x="896" y="511">מספרים גדולים.</tspan></text>
