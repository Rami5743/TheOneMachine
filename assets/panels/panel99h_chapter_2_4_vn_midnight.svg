       xml:space="preserve"
       x="-118"><tspan
         x="778"
         y="154"
         id="tspan1">עבודה מצוינת. עכשיו כבר חצות.</tspan><tspan
         x="778"
         y="205"
         id="tspan2">אתה יכול ללכת לישון. נמשיך</tspan><tspan
         x="778"
         y="256"
         id="tspan3">לעבוד מחר ב-8 בבוקר. אנחנו</tspan><tspan
         x="778"
         y="307"
         id="tspan4">צריכים ללמד את המחשב שלנו</tspan><tspan
         x="778"
         y="358"
         id="tspan5">לעבוד עם מספרים, ולא סתם עם</tspan><tspan
         x="778"
         y="409"
         id="tspan6">ביטים. אני צריך שתיזכר איך</tspan><tspan
         x="778"
         y="460"
         id="tspan7">עושים פעולות חשבון עם</tspan><tspan
         x="778"
         y="511"
         id="tspan8">מספרים גדולים.</tspan></text>
