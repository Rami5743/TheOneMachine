       stroke="none"
       xml:space="preserve"
       style="stroke-width:1.15931"><tspan
         x="211.50835"
         y="57.338177"
         id="tspan1"
         style="stroke-width:1.15931">אנחנו צריכים לכתוב</tspan><tspan
         x="211.50835"
         y="89.138222"
         id="tspan2"
         style="stroke-width:1.15931">מכתב לנשיא.</tspan><tspan
         x="211.50835"
         y="120.93825"
         id="tspan3"
         style="stroke-width:1.15931">להסביר לו את העניין.</tspan><tspan
         x="211.50835"
         y="152.7383"
         id="tspan4"
         style="stroke-width:1.15931">הוא צריך להקצות משאבים</tspan><tspan
         x="211.50835"
         y="184.52675"
         id="tspan5"
         style="stroke-width:1.15931">לפיתוח פצצה המבוססת</tspan><tspan
         x="211.50835"
         y="216.32677"
         id="tspan6"
         style="stroke-width:1.15931">על ביקוע גרעיני.</tspan><tspan
         x="211.50835"
         y="248.12683"
         id="tspan7"
         style="stroke-width:1.15931">הוא חייב לעשות את זה</tspan><tspan
         x="211.50835"
         y="279.92685"
         id="tspan8"
         style="stroke-width:1.15931">לפני היטלר.</tspan><tspan
         x="211.50835"
         y="311.7269"
         id="tspan9"
         style="stroke-width:1.15931">חשוב שאתה תחתום על המכתב,</tspan><tspan
         x="211.50835"
         y="343.51532"
         id="tspan10"
         style="stroke-width:1.15931">את השם אלברט איינשטיין</tspan><tspan
         x="211.50835"
         y="375.3154"
         id="tspan11"
         style="stroke-width:1.15931">כולם מכירים.</tspan><tspan
         x="211.50835"
         y="407.11542"
         id="tspan12"
         style="stroke-width:1.15931">את השם ליאו סילארד</tspan><tspan
         x="211.50835"
         y="438.91544"
         id="tspan13"
         style="stroke-width:1.15931">לא ממש.</tspan></text>
