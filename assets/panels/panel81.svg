    <text
       id="bubble-text"
       x="799.66162"
       y="232.45349"
       text-anchor="middle"
       dominant-baseline="middle"
       direction="rtl"
       unicode-bidi="plaintext"
       font-family="'Noto Sans Hebrew', Arial, sans-serif"
       font-size="29.6664px"
       font-weight="400"
       fill="#000000"
       stroke="none"
       xml:space="preserve"
       style="font-weight:400;font-family:'Noto Sans Hebrew', Arial, sans-serif;direction:rtl;dominant-baseline:middle;text-anchor:middle;fill:#000000;stroke:none;stroke-width:1.09875"><tspan
   x="799.66162"
   y="232.45349"
   id="tspan1"
   style="stroke-width:1.09875">עכשיו, בשנת 1943, אני די גדול,</tspan><tspan
   x="799.66162"
   y="267.61362"
   id="tspan2"
   style="stroke-width:1.09875">אבל בעוד מספר שנים יופיעו טריודות חדשות,</tspan><tspan
   x="799.66162"
   y="302.77371"
   id="tspan3"
   style="stroke-width:1.09875">שמבוססות על מוליכים למחצה ולא על שפופרות ריק.</tspan><tspan
   x="799.66162"
   y="337.93381"
   id="tspan4"
   style="stroke-width:1.09875">הן נקראות טרנזיסטורים. הן הרבה יותר קטנות,</tspan><tspan
   x="799.66162"
   y="373.0939"
   id="tspan5"
   style="stroke-width:1.09875">כך שגם אני אקטן בהרבה, ואהפוך גם למהיר בהרבה.</tspan><tspan
   x="799.66162"
   y="408.254"
   id="tspan6"
   style="stroke-width:1.09875">עם השנים אני אהפוך לקטן ומהיר עוד יותר, כך שעד</tspan><tspan
   x="799.66162"
   y="443.41409"
   id="tspan7"
   style="stroke-width:1.09875">סוף המאה ה-20 אני אהיה כל כך קטן שאפשר יהיה</tspan><tspan
   x="799.66162"
   y="478.57422"
   id="tspan8"
   style="stroke-width:1.09875">לראות אותי רק במיקרוסקופ. זה חשוב, כי צריך</tspan><tspan
   x="799.66162"
   y="513.73431"
   id="tspan9"
   style="stroke-width:1.09875">אלפים ממני כדי לבנות מחשב פשוט, ומיליונים</tspan><tspan
   x="799.66162"
   y="548.89441"
   id="tspan10"
   style="stroke-width:1.09875">בשביל מחשב של המאה ה-21.</tspan></text>
