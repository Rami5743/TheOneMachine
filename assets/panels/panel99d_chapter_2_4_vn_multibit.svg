     xml:space="preserve"
     x="-126"><tspan
       x="820"
       y="130"
       id="tspan1">עכשיו אנחנו צריכים לבנות כרטיסים</tspan><tspan
       x="820"
       y="181"
       id="tspan2">שיודעים לבחור בין יותר מ-2 אפשרויות.</tspan><tspan
       x="820"
       y="232"
       id="tspan3">בשביל זה הם יצטרכו יותר מביט בקרה אחד.</tspan><tspan
       x="820"
       y="283"
       id="tspan4">למשל, כדי לבחור בין 4 אפשרויות</tspan><tspan
       x="820"
       y="334"
       id="tspan5">אנחנו צריכים 2 ביטים. הראשון בוחר</tspan><tspan
       x="820"
       y="385"
       id="tspan6">אם אנחנו רוצים אחת משתי האפשרויות</tspan><tspan
       x="820"
       y="436"
       id="tspan7">הראשונות או אחת משתי האחרונות,</tspan><tspan
       x="820"
       y="487"
       id="tspan8">והשני בוחר אחת מבין השתיים</tspan><tspan
       x="820"
       y="538"
       id="tspan9">שבחר הביט הראשון.</tspan></text>
