       font-size="38px" font-weight="400" fill="#000000" stroke="none" xml:space="preserve"><tspan x="946" y="130">עכשיו אנחנו צריכים לבנות כרטיסים</tspan><tspan x="946" y="181">שיודעים לבחור בין יותר מ-2 אפשרויות.</tspan><tspan x="946" y="232">בשביל זה הם יצטרכו יותר מביט בקרה אחד.</tspan><tspan x="946" y="283">למשל, כדי לבחור בין 4 אפשרויות</tspan><tspan x="946" y="334">אנחנו צריכים 2 ביטים. הראשון בוחר</tspan><tspan x="946" y="385">אם אנחנו רוצים אחת משתי האפשרויות</tspan><tspan x="946" y="436">הראשונות או אחת משתי האחרונות,</tspan><tspan x="946" y="487">והשני בוחר אחת מבין השתיים</tspan><tspan x="946" y="538">שבחר הביט הראשון.</tspan></text>
