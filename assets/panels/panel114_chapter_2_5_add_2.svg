    <text id="bubble-text" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="'Noto Sans Hebrew', Arial, sans-serif" font-size="40px" font-weight="400" fill="#000000" stroke="none" xml:space="preserve"><tspan x="724" y="105" id="tline1">הבעיה היא שכרטיס שמחבר 2 ספרות לא מספיק לנו. כי לאחר</tspan><tspan x="724" y="163" id="tline2">שנחבר את ספרת האחדות, נצטרך גם להתמודד עם ה-carry</tspan><tspan x="724" y="221" id="tline3">הקודם. לכן אנו צריכים לבנות גם כרטיס שמחבר 3 ספרות.</tspan></text>
