       x="-79.668091"
       y="-6.6212769"><tspan
         x="865.33191"
         y="103.37872"
         id="tline1">יש כאן כמה תרגילים על השיטה הבינרית. לפני</tspan><tspan
         x="865.33191"
         y="163.37872"
         id="tline2">שאתה מלמד את המחשב לעבוד עם השיטה</tspan><tspan
         x="865.33191"
         y="223.37872"
         id="tline3">הבינרית, כדאי שתכיר אותה טוב בעצמך.</tspan><tspan
         x="865.33191"
         y="283.37872"
         id="tline4">אני הולך עכשיו לפגוש את נילס בוהר. הוא</tspan><tspan
