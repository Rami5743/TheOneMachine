       xml:space="preserve"
       x="288.32861"
       y="-35.31979"
       style="stroke-width:0.907271"><tspan
         x="945.19293"
         y="59.943676"
         id="tline1"
         style="stroke-width:0.907271">טוב, הנה המשימות שלך. אני צריך לחזור לנילס. יש לו</tspan><tspan
         x="945.19293"
         y="112.56541"
         id="tline2"
         style="stroke-width:0.907271">רעיון הזוי לחלוק עם הקומוניסטים את הפרויקט שלנו. אני</tspan><tspan
         x="945.19293"
         y="165.18713"
         id="tline3"
         style="stroke-width:0.907271">צריך להוריד אותו מזה, ומהר. אומנם עכשיו יש לנו אויב</tspan><tspan
         x="945.19293"
         y="217.80885"
         id="tline4"
         style="stroke-width:0.907271">משותף, אבל סטלין לא הרבה פחות גרוע מהיטלר, וזה יהיה</tspan><tspan
         x="945.19293"
         y="270.43057"
         id="tline5"
         style="stroke-width:0.907271">אסון לתת לו נשק כזה, גם אם זה יקדם אותנו קצת</tspan><tspan
         x="945.19293"
         y="323.05231"
         id="tline6"
         style="stroke-width:0.907271">בפרויקט. מצד שני קשה לשפוט את נילס, הוא היה בדנמרק</tspan><tspan
         x="945.19293"
         y="375.67401"
         id="tline7"
         style="stroke-width:0.907271">כשהנאצים נכנסו ושמע מקרוב על הזוועות של הנאצים</tspan><tspan
         x="945.19293"
         y="428.29575"
         id="tline8"
         style="stroke-width:0.907271">שעליהם אנחנו שומעים מרחוק.</tspan></text>
