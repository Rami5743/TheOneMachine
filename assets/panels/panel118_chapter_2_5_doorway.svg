<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="1448" height="1086" viewBox="0 0 1448 1086" preserveAspectRatio="xMidYMid meet" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg">
  <defs id="defs1" />
  <image id="raster-base" x="0" y="0" width="1448" height="1086" preserveAspectRatio="none" href="panel118_chapter_2_5_doorway.jpg" xlink:href="panel118_chapter_2_5_doorway.jpg" />
  <g id="text-bubble-layer" inkscape:groupmode="layer" inkscape:label="Text bubble">
    <path id="speech-bubble" d="M 228,45 H 1220 A 28 28 0 0 1 1248,73 V 527 A 28 28 0 0 1 1220,555 H 620 L 560,633 L 500,555 H 228 A 28 28 0 0 1 200,527 V 73 A 28 28 0 0 1 228,45 Z" fill="#ffffff" stroke="#000000" stroke-width="4.2" stroke-linejoin="round" stroke-linecap="round" />
    <text id="bubble-text" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="'Noto Sans Hebrew', Arial, sans-serif" font-size="40px" font-weight="400" fill="#000000" stroke="none" xml:space="preserve"><tspan x="724" y="105" id="tline1">טוב, הנה המשימות שלך. אני צריך לחזור לנילס. יש לו</tspan><tspan x="724" y="163" id="tline2">רעיון הזוי לחלוק עם הקומוניסטים את הפרויקט שלנו. אני</tspan><tspan x="724" y="221" id="tline3">צריך להוריד אותו מזה, ומהר. אומנם עכשיו יש לנו אויב</tspan><tspan x="724" y="279" id="tline4">משותף, אבל סטלין לא הרבה פחות גרוע מהיטלר, וזה יהיה</tspan><tspan x="724" y="337" id="tline5">אסון לתת לו נשק כזה, גם אם זה יקדם אותנו קצת</tspan><tspan x="724" y="395" id="tline6">בפרויקט. מצד שני קשה לשפוט את נילס, הוא היה בדנמרק</tspan><tspan x="724" y="453" id="tline7">כשהנאצים נכנסו ושמע מקרוב על הזוועות של הנאצים</tspan><tspan x="724" y="511" id="tline8">שעליהם אנחנו שומעים מרחוק.</tspan></text>
  </g>
</svg>
