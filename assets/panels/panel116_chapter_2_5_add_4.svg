       x="210.66656"
       y="3.009423"
       style="stroke-width:0.960532"><tspan
         x="906.09186"
         y="103.8653"
         id="tline1"
         style="stroke-width:0.960532">יש רק בעיה קטנה אחת: סכום של שני מספרים 16 ספרתיים</tspan><tspan
         x="906.09186"
         y="159.57617"
         id="tline2"
         style="stroke-width:0.960532">הוא לעיתים 17 ספרתי. אנחנו נתעלם מהספרה המובילה, כי</tspan><tspan
         x="906.09186"
         y="215.28703"
         id="tline3"
         style="stroke-width:0.960532">במחשב כל החיבורים קבועים, ואנחנו לא יכולים להרחיב</tspan><tspan
         x="906.09186"
         y="270.99789"
         id="tline4"
         style="stroke-width:0.960532">אותם בלי די. כל עוד כל המספרים המעורבים (כולל</tspan><tspan
         x="906.09186"
         y="326.70877"
         id="tline5"
         style="stroke-width:0.960532">התוצאה) לא יעלו על 64,000, זה יהיה בסדר. אם נעבור את</tspan><tspan
