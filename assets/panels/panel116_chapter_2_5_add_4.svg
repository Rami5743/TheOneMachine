  <image id="raster-base" x="0" y="0" width="1448" height="1086" preserveAspectRatio="none" href="panel106_chapter_2_5_workshop_vn.jpg" xlink:href="panel106_chapter_2_5_workshop_vn.jpg" />
  <g id="text-bubble-layer" inkscape:groupmode="layer" inkscape:label="Text bubble">
    <path id="speech-bubble" d="M 228,45 H 1220 A 28 28 0 0 1 1248,73 V 469 A 28 28 0 0 1 1220,497 H 620 L 560,575 L 500,497 H 228 A 28 28 0 0 1 200,469 V 73 A 28 28 0 0 1 228,45 Z" fill="#ffffff" stroke="#000000" stroke-width="4.2" stroke-linejoin="round" stroke-linecap="round" />
    <text id="bubble-text" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="'Noto Sans Hebrew', Arial, sans-serif" font-size="40px" font-weight="400" fill="#000000" stroke="none" xml:space="preserve"><tspan x="724" y="105" id="tline1">יש רק בעיה קטנה אחת: סכום של שני מספרים 16 ספרתיים</tspan><tspan x="724" y="163" id="tline2">הוא לעיתים 17 ספרתי. אנחנו נתעלם מהספרה המובילה, כי</tspan><tspan x="724" y="221" id="tline3">במחשב כל החיבורים קבועים, ואנחנו לא יכולים להרחיב</tspan><tspan x="724" y="279" id="tline4">אותם בלי די. כל עוד כל המספרים המעורבים (כולל</tspan><tspan x="724" y="337" id="tline5">התוצאה) לא יעלו על 64,000, זה יהיה בסדר. אם נעבור את</tspan><tspan x="724" y="395" id="tline6">הגודל המותר זה יוביל לתקלה שנקראת גלישה נומרית</tspan><tspan x="724" y="453" id="tline7">(Integer overflow). ננסה להימנע מזה...</tspan></text>
  </g>
</svg>
