       xml:space="preserve"
       style="font-weight:400;font-family:'Noto Sans Hebrew', Arial, sans-serif;direction:rtl;dominant-baseline:middle;text-anchor:middle;fill:#000000;stroke:none;stroke-width:1.08474"><tspan
         x="828.55817"
         y="71.986504"
         id="tspan1"
         style="stroke-width:1.08474">תפסיק עם הפורמליות. אני יודע בדיוק</tspan><tspan
         x="828.55817"
         y="106.69813"
         id="tspan2"
         style="stroke-width:1.08474">על מה מדובר. מי אתה חושב שכנע את סילארד</tspan><tspan
         x="828.55817"
         y="141.40974"
         id="tspan3"
         style="stroke-width:1.08474">לדבר עם איינשטיין? אתה יודע כמה הייתי צריך</tspan><tspan
         x="828.55817"
         y="176.12135"
         id="tspan4"
         style="stroke-width:1.08474">לחפור לו? אתם והגישה הפציפיסטית שלכם הביאו</tspan><tspan
         x="828.55817"
         y="210.83298"
         id="tspan5"
         style="stroke-width:1.08474">אותנו לברוך הזה. אני שמח שסוף סוף התעשתם.</tspan><tspan
         x="828.55817"
         y="245.5446"
         id="tspan6"
         style="stroke-width:1.08474">בטח שאשמח לעזור. זה או אנחנו או היטלר</tspan><tspan
         x="828.55817"
         y="280.25623"
         id="tspan7"
         style="stroke-width:1.08474">או סטלין. אני מעדיף שזה יהיה אנחנו.</tspan><tspan
         x="828.55817"
         y="314.96783"
         id="tspan8"
         style="stroke-width:1.08474">זה לא ממש התחום שלי, אבל אני</tspan><tspan
         x="828.55817"
         y="349.67944"
         id="tspan9"
         style="stroke-width:1.08474">יכול לנסות.</tspan></text>
