       style="font-weight:400;font-family:'Noto Sans Hebrew', Arial, sans-serif;direction:rtl;dominant-baseline:middle;text-anchor:middle;fill:#000000;stroke:none;stroke-width:1.08711"><tspan
   x="1100.0542"
   y="126.0141"
   id="tspan1"
   style="stroke-width:1.08711">כל חישוב לוקח ימים כי הם צריכים לבנות את</tspan><tspan
   x="1100.0542"
   y="159.1709"
   id="tspan2"
   style="stroke-width:1.08711">המכונה מחדש, לכל חישוב בנפרד. זה לא צריך</tspan><tspan
   x="1100.0542"
   y="192.3277"
   id="tspan3"
   style="stroke-width:1.08711">להיות כך. לא באמצע המאה ה-20. בַּבִּג׳ הבין את</tspan><tspan
   x="1100.0542"
   y="225.4845"
   id="tspan4"
   style="stroke-width:1.08711">זה עוד במאה הקודמת. אפשר לבנות מכונה אחת</tspan><tspan
   x="1100.0542"
   y="258.6413"
   id="tspan5"
   style="stroke-width:1.08711">שתוכל לבצע כל חישוב. גם טיורינג כתב על זה לפני</tspan><tspan
   x="1100.0542"
   y="291.7981"
   id="tspan6"
   style="stroke-width:1.08711">כמה שנים. לבבג' היו רק גלגלי שיניים, אז הוא לא</tspan><tspan
   x="1100.0542"
   y="324.9549"
   id="tspan7"
   style="stroke-width:1.08711">הצליח לבנות את המכונה הזאת. אבל לנו יש</tspan><tspan
   x="1100.0542"
   y="358.11169"
   id="tspan8"
   style="stroke-width:1.08711">טריודות שמבוססות על שפופרות ריק. אנחנו יכולים</tspan><tspan
   x="1100.0542"
   y="391.26849"
   id="tspan9"
   style="stroke-width:1.08711">לעשות את זה. אנחנו חייבים לעשות את זה.</tspan></text>
