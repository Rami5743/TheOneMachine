    <path
       id="speech-bubble"
       d="m 543.21677,24.531504 h 800.52203 c 12.4792,0 22.5953,10.481415 22.5953,23.410894 V 430.88579 c 0,12.92948 -10.1161,23.4109 -22.5953,23.4109 H 543.21677 c -12.47908,0 -22.59538,-10.48142 -22.59538,-23.4109 V 203.09988 L 412.23521,166.14354 520.62139,174.5712 V 47.942398 c 0,-12.929479 10.1163,-23.410894 22.59538,-23.410894 z"
