    <text
       id="bubble-text"
       text-anchor="middle"
       direction="rtl"
       unicode-bidi="plaintext"
       font-family="'Noto Sans Hebrew', Arial, sans-serif"
       font-size="36.2908px"
       font-weight="400"
       fill="#000000"
       stroke="none"
       xml:space="preserve"
       style="stroke-width:0.907271"><tspan x="945.19293" y="59.94368" id="tline1" style="stroke-width:0.907271">אני צריך לחזור לנילס. יש לו רעיון הזוי לחלוק עם</tspan><tspan x="945.19293" y="112.56541" id="tline2" style="stroke-width:0.907271">הקומוניסטים את הפרויקט שלנו. אני צריך להוריד אותו</tspan><tspan x="945.19293" y="165.18714" id="tline3" style="stroke-width:0.907271">מזה, ומהר. אומנם עכשיו יש לנו אויב משותף, אבל</tspan><tspan x="945.19293" y="217.80887" id="tline4" style="stroke-width:0.907271">סטלין לא הרבה פחות גרוע מהיטלר, וזה יהיה אסון לתת</tspan><tspan x="945.19293" y="270.43060" id="tline5" style="stroke-width:0.907271">לו נשק כזה, גם אם זה יקדם אותנו קצת בפרויקט. מצד</tspan><tspan x="945.19293" y="323.05233" id="tline6" style="stroke-width:0.907271">שני קשה לשפוט את נילס, הוא היה בדנמרק כשהנאצים</tspan><tspan x="945.19293" y="375.67406" id="tline7" style="stroke-width:0.907271">נכנסו ושמע מקרוב על הזוועות של הנאצים שעליהם אנחנו</tspan><tspan x="945.19293" y="428.29579" id="tline8" style="stroke-width:0.907271">שומעים מרחוק.</tspan></text>
  </g>
</svg>
