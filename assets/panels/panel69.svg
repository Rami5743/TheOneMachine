       xml:space="preserve"
       style="font-weight:400;font-family:'Noto Sans Hebrew', Arial, sans-serif;direction:rtl;dominant-baseline:middle;text-anchor:middle;fill:#000000;stroke:none"><tspan
   x="1098.5"
   y="110"
   id="tspan1">רוברט לא יאשר לקחת לזה אנשים. הוא לא אוהב</tspan><tspan
   x="1098.5"
   y="142"
   id="tspan2">לקחת סיכונים. אני צריך לבוא אליו עם משהו שעובד</tspan><tspan
   x="1098.5"
   y="174"
   id="tspan3">לפני שאני מבקש משהו. אבל אני לא יכול להתעסק</tspan><tspan
   x="1098.5"
   y="206"
   id="tspan4">בזה בעצמי. רוברט הפיל עליי יותר מדי פרויקטים.</tspan><tspan
   x="1098.5"
   y="238"
   id="tspan5">אני צריך למצוא מישהו חכם אחד שיוכל לעשות את זה,</tspan><tspan
   x="1098.5"
   y="270"
   id="tspan6">בלי שרוברט ידע. רק איפה אני אמצא</tspan><tspan
   x="1098.5"
   y="302"
   id="tspan7">מישהו כזה?</tspan></text>
