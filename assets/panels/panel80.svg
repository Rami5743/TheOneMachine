   style="stroke-width:1.13754">אלקטרוניים, צריך לסדר אותנו על גבי כרטיס</tspan><tspan
   x="817.4068"
   y="402.78662"
   id="tspan3"
   style="stroke-width:1.13754">ולהלחים. עוד מספר עשורים יהיה אפשר לייצר,</tspan><tspan
