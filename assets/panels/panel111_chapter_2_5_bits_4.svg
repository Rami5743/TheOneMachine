  <g id="text-bubble-layer" inkscape:groupmode="layer" inkscape:label="Text bubble">
    <path id="speech-bubble" d="M 228,45 H 1220 A 28 28 0 0 1 1248,73 V 353 A 28 28 0 0 1 1220,381 H 620 L 560,459 L 500,381 H 228 A 28 28 0 0 1 200,353 V 73 A 28 28 0 0 1 228,45 Z" fill="#ffffff" stroke="#000000" stroke-width="4.2" stroke-linejoin="round" stroke-linecap="round" />
    <text id="bubble-text" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="'Noto Sans Hebrew', Arial, sans-serif" font-size="40px" font-weight="400" fill="#000000" stroke="none" xml:space="preserve"><tspan x="724" y="105" id="tline1">נכון. עם 10 ביטים אפשר לייצג 1024 מספרים שזה בערך</tspan><tspan x="724" y="163" id="tline2">1000. לאחר מכן כל ביט מכפיל פי-2, לכן עם 15 ביטים</tspan><tspan x="724" y="221" id="tline3">אפשר לייצג בערך 32,000 מספרים, שזה עוד לא מספיק לנו.</tspan><tspan x="724" y="279" id="tline4">אבל עם 16 ביטים אפשר לייצג 64,000 מספרים שזה כבר</tspan><tspan x="724" y="337" id="tline5">סבבה לבינתיים.</tspan></text>
