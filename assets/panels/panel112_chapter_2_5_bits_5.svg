       font-family="'Noto Sans Hebrew', Arial, sans-serif"
       font-size="40px"
       font-weight="400"
       fill="#000000"
       stroke="none"
       xml:space="preserve"><tspan x="918.5" y="136.284" id="tline1">כשאני מדבר על מספרים 16 ספרתיים אני כמובן כולל גם</tspan><tspan x="918.5" y="194.284" id="tline2">מספרים עם פחות ספרות, פשוט אפשר לכתוב 0 בספרות שלא</tspan><tspan x="918.5" y="252.284" id="tline3">מופיעות. אפשר לעשות את זה גם בשיטה העשרונית. למשל,</tspan><tspan x="918.5" y="310.284" id="tline4">לכתוב 032 במקום 32. ביום יום זה לא מקובל, כי ה-0 סתם</tspan><tspan x="918.5" y="368.284" id="tline5">נראה מיותר, אבל בעולם של מכונות חישוב, זה מאוד נוח,</tspan><tspan x="918.5" y="426.284" id="tline6">כי המכונות שלנו עובדות עם מספר קבוע של ספרות, אנחנו</tspan><tspan x="918.5" y="484.284" id="tline7">הרי לא רוצים לחבר כל פעם את החוטים מחדש. לכן, אנחנו</tspan><tspan x="918.5" y="542.284" id="tline8">קובעים מראש את מספר הספרות וכותבים 0 בספרות שלא</tspan><tspan x="918.5" y="600.284" id="tline9">צריך. אנחנו גם מקפידים שלא לחרוג ממספר הספרות</tspan><tspan x="918.5" y="658.284" id="tline10">שקבענו.</tspan></text>
