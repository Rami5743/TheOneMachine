<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="1448" height="1086" viewBox="0 0 1448 1086" preserveAspectRatio="xMidYMid meet" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg">
  <defs id="defs1" />
  <image id="raster-base" x="0" y="0" width="1448" height="1086" preserveAspectRatio="none" href="panel106_chapter_2_5_workshop_vn.jpg" xlink:href="panel106_chapter_2_5_workshop_vn.jpg" />
  <g id="text-bubble-layer" inkscape:groupmode="layer" inkscape:label="Text bubble">
    <path id="speech-bubble" d="M 228,45 H 1220 A 28 28 0 0 1 1248,73 V 643 A 28 28 0 0 1 1220,671 H 620 L 560,749 L 500,671 H 228 A 28 28 0 0 1 200,643 V 73 A 28 28 0 0 1 228,45 Z" fill="#ffffff" stroke="#000000" stroke-width="4.2" stroke-linejoin="round" stroke-linecap="round" />
    <text id="bubble-text" text-anchor="middle" direction="rtl" unicode-bidi="plaintext" font-family="'Noto Sans Hebrew', Arial, sans-serif" font-size="40px" font-weight="400" fill="#000000" stroke="none" xml:space="preserve"><tspan x="724" y="105" id="tline1">כשאני מדבר על מספרים 16 ספרתיים אני כמובן כולל גם</tspan><tspan x="724" y="163" id="tline2">מספרים עם פחות ספרות, פשוט אפשר לכתוב 0 בספרות שלא</tspan><tspan x="724" y="221" id="tline3">מופיעות. אפשר לעשות את זה גם בשיטה העשרונית. למשל,</tspan><tspan x="724" y="279" id="tline4">לכתוב 032 במקום 32. ביום יום זה לא מקובל, כי ה-0 סתם</tspan><tspan x="724" y="337" id="tline5">נראה מיותר, אבל בעולם של מכונות חישוב, זה מאוד נוח,</tspan><tspan x="724" y="395" id="tline6">כי המכונות שלנו עובדות עם מספר קבוע של ספרות, אנחנו</tspan><tspan x="724" y="453" id="tline7">הרי לא רוצים לחבר כל פעם את החוטים מחדש. לכן, אנחנו</tspan><tspan x="724" y="511" id="tline8">קובעים מראש את מספר הספרות וכותבים 0 בספרות שלא</tspan><tspan x="724" y="569" id="tline9">צריך. אנחנו גם מקפידים שלא לחרוג ממספר הספרות</tspan><tspan x="724" y="627" id="tline10">שקבענו.</tspan></text>
  </g>
</svg>
