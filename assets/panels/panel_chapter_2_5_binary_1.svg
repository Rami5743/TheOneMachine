       x="-104"
       y="-8"><tspan
         x="836"
         y="97"
         id="tline1">אני צריך לספר לך איך מכונות חישוב עובדות</tspan><tspan
         x="836"
         y="155"
         id="tline2">עם מספרים. זה לא נוח לעבוד עם ספרות.</tspan><tspan
         x="836"
         y="213"
         id="tline3">אנחנו מעדיפים לעבוד עם ביטים. לביט יש</tspan><tspan
         x="836"
         y="271"
         id="tline4">רק שתי אפשרויות: 0 ו-1. כך שעם ביט אחד</tspan><tspan
         x="836"
         y="329"
         id="tline5">אפשר לכתוב רק את המספרים האלה. אם אנחנו</tspan><tspan
         x="836"
         y="387"
         id="tline6">רוצים לכתוב את 2 אנחנו נצטרך ביט נוסף.</tspan><tspan
         x="836"
         y="445"
         id="tline7">בדיוק כמו שכשמשתמשים בספרות אנחנו צריכים</tspan><tspan
