       font-size="40px"
       font-weight="400"
       fill="#000000"
       stroke="none"
       xml:space="preserve"><tspan x="948.5" y="136.284" id="tline1">מצוין, אני רואה שהבנת את הפרינציפ. עכשיו צריך ללמד</tspan><tspan x="948.5" y="194.284" id="tline2">את זה את המחשב שלנו. אנחנו יכולים לייצג מספרים</tspan><tspan x="948.5" y="252.284" id="tline3">באמצעות רצף של ביטים. אם אנחנו רוצים לבנות כרטיס</tspan><tspan x="948.5" y="310.284" id="tline4">שיבצע פעולה עם מספרים, אנחנו נכניס לתוכו בסים שייצגו</tspan><tspan x="948.5" y="368.284" id="tline5">מספרים. בס ברוחב 4 יכול לייצג מספר 4 ספרתי בשיטה</tspan><tspan x="948.5" y="426.284" id="tline6">הבינרית. אני לא בטוח שזה מספיק לנו. מה המספר הכי</tspan><tspan x="948.5" y="484.284" id="tline7">גדול שאפשר לייצג כך?</tspan></text>
