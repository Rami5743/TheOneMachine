<tspan
   x="1091.5"
   y="164"
   id="tspan1">את! את נראית לי בחורה לעניין.</tspan>
<tspan
   x="1091.5"
   y="205"
   id="tspan2">יש לי משימה סודית עבורך.</tspan>
<tspan
   x="1091.5"
   y="246"
   id="tspan3">את מכירה את המקצוע ״מחשב״?</tspan>
<tspan
