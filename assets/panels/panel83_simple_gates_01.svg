    <text
       id="bubble-text"
       x="913.57074"
       y="74.404259"
       text-anchor="middle"
       dominant-baseline="middle"
       direction="rtl"
       unicode-bidi="plaintext"
       font-family="'Noto Sans Hebrew', Arial, sans-serif"
       font-size="34.2662px"
       font-weight="400"
       fill="#000000"
       stroke="none"
       xml:space="preserve"
       style="font-weight:400;font-family:'Noto Sans Hebrew', Arial, sans-serif;direction:rtl;dominant-baseline:middle;text-anchor:middle;fill:#000000;stroke:none;stroke-width:1.18159"><tspan
         x="913.57074"
         y="74.404259"
         id="tspan1"
         style="stroke-width:1.18159">אני רואה שאתם נהנים, אבל אין לנו זמן לשטויות האלה.</tspan><tspan
         x="913.57074"
         y="115.76006"
         id="tspan2"
         style="stroke-width:1.18159">אנחנו צריכים להכין כרטיסים. הרבה כרטיסים.</tspan><tspan
         x="913.57074"
         y="157.11584"
         id="tspan3"
         style="stroke-width:1.18159">הכרטיסים מורכבים מכמה שערים שמחוברים יחד</tspan><tspan
         x="913.57074"
         y="198.47163"
         id="tspan4"
         style="stroke-width:1.18159">כדי לבצע פעולה מסוימת. לכל כרטיס יש כניסות</tspan><tspan
         x="913.57074"
         y="239.82742"
         id="tspan5"
         style="stroke-width:1.18159">ויציאות משלו. אתה יכול לחבר יציאה של אחד</tspan><tspan
         x="913.57074"
         y="281.18323"
         id="tspan6"
         style="stroke-width:1.18159">לכניסה של שער אחר, אבל אל תחבר יציאה ליציאה</tspan><tspan
         x="913.57074"
         y="322.539"
         id="tspan7"
         style="stroke-width:1.18159">או כניסה לכניסה, שלא תשרוף לי אותם.</tspan><tspan
         x="913.57074"
         y="363.89481"
         id="tspan8"
         style="stroke-width:1.18159">אתה יכול לחבר אותה יציאה ליותר ממקבל אחד.</tspan><tspan
         x="913.57074"
         y="405.25061"
         id="tspan9"
         style="stroke-width:1.18159">אתה יכול להשתמש בכמה שאתה צריך. יש לנו מספיק במחסן.</tspan><tspan
         x="913.57074"
         y="446.60638"
         id="tspan10"
         style="stroke-width:1.18159">רק אף מילה לאף אחד. כשאתה גומר כרטיס</tspan><tspan
         x="913.57074"
         y="487.96219"
         id="tspan11"
         style="stroke-width:1.18159">אתה יכול להשתמש בו בכרטיסים אחרים שאתה מכין,</tspan><tspan
         x="913.57074"
         y="529.31799"
         id="tspan12"
         style="stroke-width:1.18159">כמו שאתה משתמש בשערים. אתה לא צריך להכין אותו</tspan><tspan
         x="913.57074"
         y="570.67377"
         id="tspan13"
         style="stroke-width:1.18159">כל פעם מחדש, פשוט תסמן באיזה כרטיס אתה משתמש.</tspan><tspan
         x="913.57074"
         y="612.02954"
         id="tspan14"
         style="stroke-width:1.18159">יש לי אנשים שידאגו לזה, רק הם לא צריכים</tspan><tspan
         x="913.57074"
         y="653.38538"
         id="tspan15"
         style="stroke-width:1.18159">לדעת שזה בא ממך.</tspan></text>
