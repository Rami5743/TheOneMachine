   x="875.25165"
   y="54.596306"
   id="tspan1"
   style="stroke-width:1.01358">אי אפשר לעבוד כך.</tspan><tspan
   x="875.25165"
   y="85.510399"
   id="tspan2"
   style="stroke-width:1.01358">החישובים לוקחים יותר מדי זמן.</tspan><tspan
   x="875.25165"
   y="116.42449"
   id="tspan3"
   style="stroke-width:1.01358">עד שנגמור את הפצצה</tspan><tspan
   x="875.25165"
   y="147.33858"
   id="tspan4"
   style="stroke-width:1.01358">הנאצים יהרסו את כל אירופה.</tspan><tspan
   x="875.25165"
   y="178.25267"
   id="tspan5"
   style="stroke-width:1.01358">יש לי עדיין קרובים בהונגריה,</tspan><tspan
   x="875.25165"
   y="209.16676"
   id="tspan6"
   style="stroke-width:1.01358">כרגע הם יחסית בטוחים,</tspan><tspan
   x="875.25165"
   y="240.08086"
   id="tspan7"
   style="stroke-width:1.01358">אבל זה יכול להשתנות בכל רגע.</tspan><tspan
