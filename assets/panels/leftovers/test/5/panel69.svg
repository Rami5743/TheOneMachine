        font-family="Noto Sans Hebrew, Arial, sans-serif"
        font-size="27"
        font-weight="400"
        fill="#000000"
        stroke="none"
        xml:space="preserve">
    <tspan x="1082.50" y="132.25">רוברט לא יאשר לקחת לזה אנשים. הוא לא אוהב</tspan>
    <tspan x="1082.50" y="164.25">לקחת סיכונים. אני צריך לבוא אליו עם משהו שעובד</tspan>
    <tspan x="1082.50" y="195.86">לפני שאני מבקש משהו. אבל אני לא יכול להתעסק</tspan>
    <tspan x="1082.50" y="228.64">בזה בעצמי. רוברט הפיל עלי יותר מדי פרויקטים. אני</tspan>
    <tspan x="1082.50" y="261.41">צריך למצוא מישהו חכם אחד שיוכל לעשות את זה, בלי</tspan>
    <tspan x="1082.50" y="293.86">שרוברט ידע. רק איפה אני אמצא מישהו כזה?</tspan>
  </text>
