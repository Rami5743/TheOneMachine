    <tspan x="1082.50" y="151.74">אתה תצטרך לבנות מכונה שעושה את</tspan>
    <tspan x="1082.50" y="196.16">זה במקום הבן-אדם. זאת תהיה מכונת</tspan>
    <tspan x="1082.50" y="237.66">חישוב שתוכל לעשות כל חישוב. נקרא</tspan>
    <tspan x="1082.50" y="280.83">לה מחשב אלקטרוני. אולי פעם היא</tspan>
    <tspan x="1082.50" y="325.16">תחליף את המחשבים, ואז יקראו לה</tspan>
    <tspan x="1082.50" y="368.16">מחשב.</tspan>
