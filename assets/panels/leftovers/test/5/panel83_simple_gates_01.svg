  <text id="bubble-text"
        x="893.00" y="109.40"
        text-anchor="middle"
        dominant-baseline="middle"
        direction="rtl"
        unicode-bidi="plaintext"
        font-family="Noto Sans Hebrew, Arial, sans-serif"
        font-size="38"
        font-weight="400"
        fill="#000000"
        stroke="none"
        xml:space="preserve">
    <tspan x="893.00" y="116.24">אני ראה שאתם נהנים. אבל אין לנו זמן לשטויות האלה.</tspan>
    <tspan x="893.00" y="157.13">אנחנו צריכים להכין כרטיסים. הרבה כרטיסים. הכרטיסים</tspan>
    <tspan x="893.00" y="195.84">מורכבים מכמה 41%0א-ים שמחוברים יחד כדי לבצע</tspan>
    <tspan x="893.00" y="235.95">פעולה מסוימת. לכל כרטיס יש כניסות ויצאות משלו. אתה</tspan>
    <tspan x="893.00" y="274.28">יכול לחבר יציאה של אחד לכניסה של סאג</tspan>
    <tspan x="893.00" y="315.78">אחר, אבל אל תחבר יציאה ליציאה או כניסה לכניסה,</tspan>
    <tspan x="893.00" y="355.49">שלא תישרוף לי אותם. אתה יכול לחבר אותה יציאה ליותר</tspan>
    <tspan x="893.00" y="395.84">מקבל אחד. אתה יכול להשתמש בכמה שאתה</tspan>
    <tspan x="893.00" y="438.09">צריך. יש לנו מספיק במחסן. רק אף מילה לאף אחד.</tspan>
    <tspan x="893.00" y="476.03">כשאתה גומר כרטיס אתה יכול להשתמש בו בכרטיסים</tspan>
    <tspan x="893.00" y="518.20">אחרים שאתה מכין (כמו שאתה משתמש ב-</tspan>
    <tspan x="893.00" y="557.29">אתה לא צריך להכין אותו כל פעם מחדש, פשוט תסמן</tspan>
    <tspan x="893.00" y="596.74">באיזה כרטיס אתה משתמש. יש לי אנשים שידאגו לזה, רק</tspan>
    <tspan x="893.00" y="636.55">הם לא צריכים לדעת שזה בה ממך.</tspan>
  </text>
