    <tspan x="826.00" y="368.82">רוצה לדעת מה אני עושה?</tspan>
    <tspan x="826.00" y="414.12">תנסה לחבר חלק מהכנייסות שלי</tspan>
    <tspan x="826.00" y="460.42">למקור מתח ואת היציאה למנורה.</tspan>
