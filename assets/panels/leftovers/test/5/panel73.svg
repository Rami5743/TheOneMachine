    <tspan x="1074.00" y="171.34">אני לא יכול לספר לך כרגע למה</tspan>
    <tspan x="1074.00" y="216.41">צריך את המכונה, אבל תאמין לי, זה</tspan>
    <tspan x="1074.00" y="258.70">חשוב לכל האנושות. אני אתן לך את</tspan>
    <tspan x="1074.00" y="302.20">מה שאתה צריך, אבל אתה תצטרך</tspan>
    <tspan x="1074.00" y="341.99">לעשות הכל לבד. אסור לך לדבר על</tspan>
    <tspan x="1074.00" y="386.82">זה עם אף אחד. אפילו לא עם רוברט.</tspan>
