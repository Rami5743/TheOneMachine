  <text id="bubble-text"
        x="1089.00" y="110.94"
        text-anchor="middle"
        dominant-baseline="middle"
        direction="rtl"
        unicode-bidi="plaintext"
        font-family="Noto Sans Hebrew, Arial, sans-serif"
        font-size="28"
        font-weight="400"
        fill="#000000"
        stroke="none"
        xml:space="preserve">
    <tspan x="1089.00" y="115.98">כל חישוב לוקח ימים כי הם צריכים לבנות את</tspan>
    <tspan x="1089.00" y="155.04">המכונה מחדש, לכל חישוב בנפרד. זה לא צריך</tspan>
    <tspan x="1089.00" y="193.98">להיות כך. לא באמצע המאה ה-20. בַּבָּג' הבין את</tspan>
    <tspan x="1089.00" y="232.41">זה עוד במאה הקודמת. אפשר לבנות מכונה אחת</tspan>
    <tspan x="1089.00" y="270.64">שתוכל לבצע כל חישוב. גם טיורינג כתב על זה לפני</tspan>
    <tspan x="1089.00" y="310.54">כמה שנים. לבבג' היו רק גלגלי שיניים אז הוא לא</tspan>
    <tspan x="1089.00" y="348.48">הצליח לבנות את המכונה הזאת. אבל לנו יש</tspan>
    <tspan x="1089.00" y="388.12">טריודות מבוססות שפורפרות ריק. אנחנו יכולים</tspan>
    <tspan x="1089.00" y="427.04">לעשות את זה. אנחנו חייבים לעשות את זה.</tspan>
  </text>
  </g>
