        xml:space="preserve">
    <tspan x="822.00" y="336.20">היום, כדי להרכיב ממספר רכיב</tspan>
    <tspan x="822.00" y="376.30">אלקטרוני, צריך לסדר אותנו על גבי כרטיס</tspan>
    <tspan x="822.00" y="416.73">ולהלחים. עוד מספר עשורים יהיה אפשר לייצר</tspan>
    <tspan x="822.00" y="456.23">בעצם להדפיס אלפים או אפילו מיליונים ממני</tspan>
    <tspan x="822.00" y="498.99">בבת אחת, מחוברים יחד לפי תכנון מראש וארוזים</tspan>
    <tspan x="822.00" y="539.44">בקופסה קטנה שנקראת צ'יפ. את הצ'יפים האלה</tspan>
    <tspan x="822.00" y="580.38">ירכיבו על כרטיסים, ומהם יבנו מחשבים.</tspan>
  </text>
