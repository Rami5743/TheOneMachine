    <tspan x="903.50" y="112.08">אני רץ לפגישה עם אד טלר, הפסיכי הזה</tspan>
    <tspan x="903.50" y="157.44">חושב שהפצצה שאנחנו בונים לא מספיק חזקה,</tspan>
    <tspan x="903.50" y="202.18">ורוצה לפתח פצצה חזקה יותר.</tspan>
    <tspan x="903.50" y="249.58">אופס.. תשכח מהמשפט האחרון שאמרתי.</tspan>
    <tspan x="903.50" y="293.41">אתה לא אמור לשמוע את זה.</tspan>
