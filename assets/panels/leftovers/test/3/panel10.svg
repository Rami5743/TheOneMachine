        xml:space="preserve">
    <tspan x="224.50" y="83.90">ב</tspan>
    <tspan x="224.50" y="155.40">/</tspan>
    <tspan x="224.50" y="171.32">אתה יודע על מה! אנשים קוראים</tspan>
    <tspan x="224.50" y="185.40">5</tspan>
    <tspan x="224.50" y="208.30">המאמר שכתבתי לפני 5 שנים.</tspan>
    <tspan x="224.50" y="247.40">ושטרסמן עשו ניסויים</tspan>
    <tspan x="224.50" y="284.77">עם אורניום, שהוכיחו שהוא</tspan>
    <tspan x="224.50" y="322.90">מתבקע. היזנברג חושב על</tspan>
    <tspan x="224.50" y="360.98">זה. נילס בור כתב לי שהיזנברג</tspan>
    <tspan x="224.50" y="399.40">נפגש איתו ושאל שאלות.</tspan>
    <tspan x="224.50" y="438.90">נילס כמובן נפנף אותו, אבל</tspan>
    <tspan x="224.50" y="476.10">אתה יודע שהיזנברג לא טיפש</tspan>
  </text>
