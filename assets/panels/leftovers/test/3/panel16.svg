  <text id="bubble-text"
        x="290.50" y="73.17"
        text-anchor="middle"
        dominant-baseline="middle"
        direction="rtl"
        unicode-bidi="plaintext"
        font-family="Noto Sans Hebrew, Arial, sans-serif"
        font-size="31"
        font-weight="400"
        fill="#000000"
        stroke="none"
        xml:space="preserve">
    <tspan x="290.50" y="78.75">חנו צריכים לכתוב</tspan>
    <tspan x="290.50" y="116.83">מכתב לנשיא. להסביר לו את העניין,</tspan>
    <tspan x="290.50" y="155.58">הוא צריך להקצות משאבים לפיתוח</tspan>
    <tspan x="290.50" y="194.38">פצצה המבוססת על ביקוע גרעיני.</tspan>
    <tspan x="290.50" y="232.08">הוא חייב לעשות את זה</tspan>
    <tspan x="290.50" y="267.08">לפני היטלר.</tspan>
    <tspan x="290.50" y="305.08">/ חשוב שאתה תתתום על המכתב,</tspan>
    <tspan x="290.50" y="345.83">את השם אלברט איינשטיין</tspan>
    <tspan x="290.50" y="383.95">כולם מכירים. את השם</tspan>
    <tspan x="290.50" y="422.20">ליאו סילארה לא ממש.</tspan>
    <tspan x="290.50" y="495.08">ו</tspan>
    <tspan x="290.50" y="516.58">2 6</tspan>
  </text>
