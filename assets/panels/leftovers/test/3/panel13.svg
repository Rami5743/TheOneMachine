        font-size="29"
        font-weight="400"
        fill="#000000"
        stroke="none"
        xml:space="preserve">
    <tspan x="797.50" y="159.22">אנחנו?! אתה מתכוון לממשלה?</tspan>
    <tspan x="797.50" y="196.14">זדבר שאתה מדבר עליו יכול ליצור</tspan>
    <tspan x="797.50" y="235.08">פצצה יותר חזקה מכל הפצצות בעולם ביחד.</tspan>
    <tspan x="797.50" y="273.72">אי אפשר לסמוך על אף ממשלה</tspan>
    <tspan x="797.50" y="312.08">להחזיק כוח כזה. אני אסיר תודה למדינה</tspan>
    <tspan x="797.50" y="350.66">על הרבה דברים, אבל אני לא סומך עליה,</tspan>
    <tspan x="797.50" y="390.03">או על אף מדינה אחרת. עם אנרגיה גרעינית,</tspan>
    <tspan x="797.50" y="428.58">, אני אסמוך רק על ממשלה עולמית,</tspan>
    <tspan x="797.50" y="465.97">וגם אז היא לעולם לא תפתח</tspan>
    <tspan x="797.50" y="504.72">פצצות גרעיניות.</tspan>
    <tspan x="797.50" y="549.72">/</tspan>
  </text>
