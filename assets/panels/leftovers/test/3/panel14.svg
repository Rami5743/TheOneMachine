    <tspan x="577.50" y="406.52">5</tspan>
    <tspan x="577.50" y="495.94">אתה יודע שאני שותף לחזון שלך</tspan>
    <tspan x="577.50" y="529.94">של ממשלה עולמית, אבל אני מדבר</tspan>
    <tspan x="577.50" y="565.02">4 איתך על המציאות, לא על החזון. אתה</tspan>
    <tspan x="577.50" y="602.59">לימדת אותנו שהכל יחסי. השאלה היא לא</tspan>
    <tspan x="577.50" y="635.81">האם אתה סומך ארה"ב, אלא על מי</tspan>
    <tspan x="577.50" y="674.60">אתה סומך יותר: על רוזבלט וממשלת</tspan>
    <tspan x="577.50" y="709.88">ארצות הברית או על היטלר והממשלה של</tspan>
    <tspan x="577.50" y="746.60">גרמניה הנאצית. אני לא חושב שזאת</tspan>
    <tspan x="577.50" y="783.52">שאלה קשה...</tspan>
  </text>
