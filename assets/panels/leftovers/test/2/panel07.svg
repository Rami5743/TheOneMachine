        xml:space="preserve">
    <tspan x="781.00" y="183.98">השתגעת, עכשיו, עם כל המתיחות</tspan>
    <tspan x="781.00" y="222.32">באירופה, להעלות את הנושא של</tspan>
    <tspan x="781.00" y="260.66">חשמל מבקוע גרעיני, זה סכנת נפשות,</tspan>
    <tspan x="781.00" y="299.00">הרי דיברנו על זה, אפשר לעשות עם זה</tspan>
    <tspan x="781.00" y="337.34">ממש לא רק חשמל. רק כשתהיה ממשלה</tspan>
    <tspan x="781.00" y="375.68">עולמית חזקה, מונהגת על ידי מדענים</tspan>
    <tspan x="781.00" y="414.02">יהיה אפשר לדבר על זה.</tspan>
