    <tspan
   x="781.00"
   y="183.98"
   id="tspan1">השתגעת, עכשיו, עם כל המתיחות</tspan>
    <tspan
   x="781.00"
   y="222.32"
   id="tspan2">באירופה, להעלות את הנושא של</tspan>
    <tspan
   x="781.00"
   y="260.66"
   id="tspan3">חשמל מבקוע גרעיני, זה סכנת נפשות,</tspan>
    <tspan
   x="781.00"
   y="299.00"
   id="tspan4">הרי דיברנו על זה, אפשר לעשות עם זה</tspan>
    <tspan
   x="781.00"
   y="337.34"
   id="tspan5">ממש לא רק חשמל. רק כשתהיה ממשלה</tspan>
    <tspan
   x="781.00"
   y="375.68"
   id="tspan6">עולמית חזקה, מונהגת על ידי מדענים</tspan>
    <tspan
   x="781.00"
   y="414.02"
   id="tspan7">יהיה אפשר לדבר על זה.</tspan>
