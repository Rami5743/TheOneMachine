    <tspan x="504.50" y="116.84">אז זהו, על זה רציתי לדבר איתך.</tspan>
    <tspan x="504.50" y="157.67">אני צריך את עזרתך בפרויקט לאומי</tspan>
    <tspan x="504.50" y="195.76">בעל חשיבות עליונה. אני לא יכול</tspan>
    <tspan x="504.50" y="236.84">להגיד לך בשלב זה במה מדובר,</tspan>
