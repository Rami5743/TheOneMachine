    <tspan x="891.50" y="36.08">מ</tspan>
    <tspan x="891.50" y="87.00">אי אפשר לעבוד כך. החישובים לוקחים</tspan>
    <tspan x="891.50" y="121.58">יותר מדי זמן. עד שנגמור את הפצצה</tspan>
    <tspan x="891.50" y="154.65">הנאצים יהרסו את כל אירופה. יש לי</tspan>
    <tspan x="891.50" y="191.08">עדיין קרובים בהונגריה, כרגע הם</tspan>
    <tspan x="891.50" y="223.08">יחסית בטוחים, אבל זה יכול להשתנות</tspan>
    <tspan x="891.50" y="258.28">בכל רגע, אומרים שהנאצים רוצחים</tspan>
    <tspan x="891.50" y="291.58">את כל היהודים שהם יכולים.</tspan>
  </text>
