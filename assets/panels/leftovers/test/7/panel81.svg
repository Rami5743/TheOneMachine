  <text id="bubble-text"
        x="800.50" y="227.14"
        text-anchor="middle"
        dominant-baseline="middle"
        direction="rtl"
        unicode-bidi="plaintext"
        font-family="Noto Sans Hebrew, Arial, sans-serif"
        font-size="33"
        font-weight="400"
        fill="#000000"
        stroke="none"
        xml:space="preserve">
    <tspan x="800.50" y="233.08">עכשיו, בשנת אני די גדול, אבל בעוד</tspan>
    <tspan x="800.50" y="270.77">מספר שנים יופיעו טריודות חדשות, שמבוססות</tspan>
    <tspan x="800.50" y="305.87">על מוליכים למחצה ולא על שפופרות ריק.</tspan>
    <tspan x="800.50" y="345.23">הן נקראות טרנזיסטורים. הן הרבה יותר קטנות,</tspan>
    <tspan x="800.50" y="381.27">כך שגם אני אקטן בהרבה, ואהפוך גם למהיר בהרבה.</tspan>
    <tspan x="800.50" y="419.24">עם השנים אני אהפוך לקטן ומהיר עוד יותר, כך שעד</tspan>
    <tspan x="800.50" y="456.19">סוף המאה ה-20 אני אהיה כל כך קטן שאפשר יהיה</tspan>
    <tspan x="800.50" y="494.00">לראות אותי רק במיקרוסקופ. זה חשוב, כי צריך</tspan>
    <tspan x="800.50" y="529.08">אלפים ממני כדי לבנות מחשב פשוט, ומיליונים</tspan>
    <tspan x="800.50" y="565.44">בשביל מחשב של המאה ה-21.</tspan>
  </text>
