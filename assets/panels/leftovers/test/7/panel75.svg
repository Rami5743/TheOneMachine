    <tspan x="933.00" y="478.81">שלום, אני אני אחד</tspan>
    <tspan x="933.00" y="510.81">המעגלים הכי פשוטים שיש.</tspan>
    <tspan x="933.00" y="543.10">אני בנוי רק משתי טרידות ונגד.</tspan>
    <tspan x="933.00" y="573.76">אבל אפשר לבנות ממני כל מכונת</tspan>
    <tspan x="933.00" y="606.58">חישוב, אפילו את המחשב שאתה</tspan>
    <tspan x="933.00" y="638.51">וג'ון מנסים לבנות.</tspan>
