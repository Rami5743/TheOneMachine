        font-family="Noto Sans Hebrew, Arial, sans-serif"
        font-size="28"
        font-weight="400"
        fill="#000000"
        stroke="none"
        xml:space="preserve">
    <tspan x="882.00" y="72.87">תפסיק עם הפורמליות. אני יודע בדיוק</tspan>
    <tspan x="882.00" y="106.98">על מה מדובר. מי אתה חושב שכנע את סילארד</tspan>
    <tspan x="882.00" y="142.73">לדבר עם איינשטיין? אתה יודע כמה הייתי צריך</tspan>
    <tspan x="882.00" y="176.68">לחפור לו? אתם והגישה הפציפיסטית שלכם הביאו</tspan>
    <tspan x="882.00" y="214.29">אותנו לברוך הזה. אני שמח שפוף פוף התעשתם.</tspan>
    <tspan x="882.00" y="249.10">בטח שאשמח לעזור. זה או אנחנו או היטלר</tspan>
    <tspan x="882.00" y="285.90">או סטלין. אני מעדיף שזה יהיה אנחנו.</tspan>
    <tspan x="882.00" y="320.97">זה לא ממש התחום שלי, אבל אני</tspan>
    <tspan x="882.00" y="353.54">יכול לנסות.</tspan>
  </text>
