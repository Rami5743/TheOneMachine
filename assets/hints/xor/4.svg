       xml:space="preserve">     <tspan
   x="731.5"
   y="51"
   id="tspan1">הנה לדוגמה, השורה הזאת</tspan>     <tspan
   x="731.5"
   y="86.199997"
   id="tspan2">אומרת שאנחנו צריכים להוציא 1</tspan>     <tspan
   x="731.5"
   y="121.4"
   id="tspan3">כאשר הכניסה הראשונה היא 0</tspan>     <tspan
   x="731.5"
   y="156.60001"
   id="tspan4">והשנייה היא 1.</tspan>     <tspan
   x="731.5"
   y="191.8"
   id="tspan5">קל מאוד לבנות כרטיס</tspan>     <tspan
   x="731.5"
   y="227"
   id="tspan6">שעושה את זה על ידי שילוב</tspan>     <tspan
   x="731.5"
   y="262.20001"
   id="tspan7">של NOT ו-AND.</tspan>     <tspan
   x="731.5"
   y="297.39999"
   id="tspan8">עושים אותו דבר גם לשאר השורות,</tspan>     <tspan
   x="731.5"
   y="332.60001"
   id="tspan9">ובסוף, מכיוון שמספיק לנו</tspan> <tspan
   x="731.5"
   y="367.79999"
   id="tspan10">שאחת מהשורות תתקיים,</tspan> <tspan
   x="731.5"
   y="403"
   id="tspan11">מכניסים את הכול ל-OR.</tspan></text>
