  <!--
    Editable MUX GENERIC solution — a WYSIWYG preview of how it looks on
    the workbench: real gate graphics at the workbench size, the card frame, and
    the wires. To reposition a gate, move its group (the gate image + its small
    red centre dot) together. The RED DOT's centre is the gate position the app
    uses; keep each dot's data-id unchanged. The wires in <g id="mux-wires"> are
    baked in statically (so they show in a plain, non-scripting viewer too) AND
    recomputed by the <script> from the dot positions when opened in a browser,
    so after you drag a gate they follow it. The script also posts the positions
    to the app (the same <object>+postMessage trick the panel hotspots use).
  -->
