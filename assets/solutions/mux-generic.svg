  <!--
    Editable MUX GENERIC solution — the SINGLE SOURCE OF TRUTH for how
    this solution looks and wires up on the workbench. Edit it in Inkscape:

      * GATES: move a gate group (the image + its red centre dot) together. The
        RED DOT's centre is the position the app uses; keep its data-id.
      * WIRES: each <polyline data-mux-wire> is one wire. Move its end nodes (or
        add nodes in between for routing) freely. The app reads only the two END
        nodes of each wire and snaps them to the NEAREST pin, so a wire that ends
        near a pin still connects to it. The blue dots (data-mux-pin) mark every
        pin end as a snap target.
      * The app rebuilds BOTH the gate positions AND the wiring (netlist) from
        this file via <object>+postMessage, so your edits here drive the app.
        (Straight/​bent routing is only cosmetic in the editor; the app draws its
        own straight pin-to-pin wires from the derived netlist.)
  -->
