<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" viewBox="0 0 1000 600" width="1000" height="600">
  <!--
    Editable MUX COMPACT solution. Everything is UNGROUPED and top-level:
    each gate is an <image> + its red centre dot + blue pin dots; each wire is one
    <path class="mux-wire">. Move a gate by moving its image + red dot together
    (the RED DOT is the position the app reads). Wires are cosmetic in the editor;
    the app draws its own straight pin-to-pin wiring. The blue dots mark pin ends
    (snap targets). Snapping is pre-enabled in <sodipodi:namedview> below; if your
    Inkscape still won't snap, it doesn't matter - the app snaps wire ends to the
    nearest pin automatically.
  -->
  <sodipodi:namedview id="namedview1" inkscape:snap-global="true" inkscape:snap-nodes="true"
     inkscape:object-nodes="true" inkscape:snap-others="true" inkscape:snap-object-midpoints="true"
     inkscape:snap-center="true" inkscape:snap-bbox="true" inkscape:bbox-nodes="true"
     inkscape:snap-to-guides="true" inkscape:snap-grids="true" inkscape:snap-smooth-nodes="true"/>
  <rect x="0" y="0" width="1000" height="600" fill="#8a6f45" id="board-bg"/>
  <rect x="150" y="60" width="700" height="456" rx="18" fill="#8a6f45" fill-opacity="1" stroke="rgba(245,235,215,0.92)" stroke-width="3" id="card-frame"/>
  <text x="500" y="48" text-anchor="middle" fill="#f6ead7" font-family="sans-serif" font-size="28" font-weight="800" id="card-title">MUX</text>
  <line x1="125" y1="188" x2="175" y2="188" stroke="#111" stroke-width="5" stroke-linecap="round" id="stub-in1"/>
  <line x1="125" y1="388" x2="175" y2="388" stroke="#111" stroke-width="5" stroke-linecap="round" id="stub-in2"/>
  <line x1="300" y1="40" x2="300" y2="80" stroke="#111" stroke-width="5" stroke-linecap="round" id="stub-ctrl"/>
  <line x1="800" y1="288" x2="875" y2="288" stroke="#111" stroke-width="5" stroke-linecap="round" id="stub-out"/>
  <text x="108" y="194" text-anchor="end" fill="#f6ead7" font-family="sans-serif" font-size="22" font-weight="800" id="lbl-1">1</text>
  <text x="108" y="394" text-anchor="end" fill="#f6ead7" font-family="sans-serif" font-size="22" font-weight="800" id="lbl-2">2</text>
  <text x="300" y="28" text-anchor="middle" fill="#f6ead7" font-family="sans-serif" font-size="22" font-weight="800" id="lbl-ctrl">בקרה</text>
  <image href="../components/source.svg" x="9" y="238" width="92" height="100" id="source-img"/>
  <image href="../components/lamp-off.svg" x="855" y="158" width="110" height="140" id="lamp-img"/>
  <!-- WIRES (ungrouped) -->
  <path class="mux-wire" data-mux-wire="1" d="M 300,80 344,175" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire1"/>
  <path class="mux-wire" data-mux-wire="1" d="M 175,188 462.8,226.2" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire2"/>
  <path class="mux-wire" data-mux-wire="1" d="M 428,175 462.8,253.8" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire3"/>
  <path class="mux-wire" data-mux-wire="1" d="M 175,388 462.8,396.2" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire4"/>
  <path class="mux-wire" data-mux-wire="1" d="M 300,80 462.8,423.8" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire5"/>
  <path class="mux-wire" data-mux-wire="1" d="M 539.6,240 625.2,306.2" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire6"/>
  <path class="mux-wire" data-mux-wire="1" d="M 539.6,410 625.2,333.8" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire7"/>
  <path class="mux-wire" data-mux-wire="1" d="M 708,320 800,288" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire8"/>
  <!-- GATES (ungrouped) -->
  <!-- gate not-c -->
