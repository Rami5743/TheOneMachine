<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1000 600" width="1000" height="600">
  <!--
    Editable MUX COMPACT solution (source of truth for the workbench).
    In Inkscape: move a gate group (image + red dot) together; the RED DOT is the
    position the app uses. Draw/route each wire (a <path class="mux-wire">) freely
    - the app reads only its two END points and snaps each to the NEAREST pin
    (blue dots = pin snap targets). The app rebuilds the gate POSITIONS from this
    file; the wiring stays the canonical correct MUX so the guided walkthrough
    highlights stay meaningful.
  -->
  <rect x="0" y="0" width="1000" height="600" fill="#8a6f45" id="board-bg"/>
  <rect x="150" y="60" width="700" height="456" rx="18" fill="#8a6f45" fill-opacity="1" stroke="rgba(245,235,215,0.92)" stroke-width="3" id="card-frame"/>
  <text x="500" y="48" text-anchor="middle" fill="#f6ead7" font-family="sans-serif" font-size="28" font-weight="800">MUX</text>
  <g stroke="#111" stroke-width="5" stroke-linecap="round" id="card-pin-stubs">
    <line x1="125" y1="188" x2="175" y2="188"/>
    <line x1="125" y1="388" x2="175" y2="388"/>
    <line x1="300" y1="40" x2="300" y2="80"/>
    <line x1="800" y1="288" x2="875" y2="288"/>
  </g>
  <g fill="#f6ead7" font-family="sans-serif" font-size="22" font-weight="800" id="card-labels">
    <text x="108" y="194" text-anchor="end">1</text>
    <text x="108" y="394" text-anchor="end">2</text>
    <text x="300" y="28" text-anchor="middle">בקרה</text>
  </g>
  <image href="../components/source.svg" x="44" y="238" width="92" height="100" id="source-img"/>
  <image href="../components/lamp-off.svg" x="855" y="158" width="110" height="140" id="lamp-img"/>
  <g id="mux-wires">
    <path class="mux-wire" data-mux-wire="1" d="M 300,80 344,175" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire1"/>
    <path class="mux-wire" data-mux-wire="1" d="M 175,188 462.8,226.2" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire2"/>
    <path class="mux-wire" data-mux-wire="1" d="M 428,175 462.8,253.8" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire3"/>
    <path class="mux-wire" data-mux-wire="1" d="M 175,388 462.8,396.2" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire4"/>
    <path class="mux-wire" data-mux-wire="1" d="M 300,80 462.8,423.8" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire5"/>
    <path class="mux-wire" data-mux-wire="1" d="M 539.6,240 625.2,306.2" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire6"/>
    <path class="mux-wire" data-mux-wire="1" d="M 539.6,410 625.2,333.8" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire7"/>
    <path class="mux-wire" data-mux-wire="1" d="M 708,320 800,288" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire8"/>
  </g>
  <g id="mux-gates">
    <g class="mux-gate" data-gate-id="not-c">
      <image href="../components/gate-not.svg" x="340.4" y="143.8" width="92.4" height="62.4"/>
      <rect data-mux-comp="1" data-id="not-c" data-type="gate-Not" x="376" y="171" width="8" height="8" fill="#e0392b" fill-opacity="0.55"/>
      <circle data-mux-pin="not-c.in1" cx="344" cy="175" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
      <circle data-mux-pin="not-c.out" cx="428" cy="175" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
    </g>
    <g class="mux-gate" data-gate-id="and-1">
      <image href="../components/gate-and.svg" x="460.4" y="208.8" width="92.4" height="62.4"/>
      <rect data-mux-comp="1" data-id="and-1" data-type="gate-And" x="496" y="236" width="8" height="8" fill="#e0392b" fill-opacity="0.55"/>
      <circle data-mux-pin="and-1.in1" cx="462.8" cy="226.2" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
      <circle data-mux-pin="and-1.in2" cx="462.8" cy="253.8" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
      <circle data-mux-pin="and-1.out" cx="539.6" cy="240" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
    </g>
    <g class="mux-gate" data-gate-id="and-2">
      <image href="../components/gate-and.svg" x="460.4" y="378.8" width="92.4" height="62.4"/>
      <rect data-mux-comp="1" data-id="and-2" data-type="gate-And" x="496" y="406" width="8" height="8" fill="#e0392b" fill-opacity="0.55"/>
      <circle data-mux-pin="and-2.in1" cx="462.8" cy="396.2" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
      <circle data-mux-pin="and-2.in2" cx="462.8" cy="423.8" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
      <circle data-mux-pin="and-2.out" cx="539.6" cy="410" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
    </g>
    <g class="mux-gate" data-gate-id="or-1">
      <image href="../components/gate-or.svg" x="620.4" y="288.8" width="92.4" height="62.4"/>
      <rect data-mux-comp="1" data-id="or-1" data-type="gate-Or" x="656" y="316" width="8" height="8" fill="#e0392b" fill-opacity="0.55"/>
      <circle data-mux-pin="or-1.in1" cx="625.2" cy="306.2" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
      <circle data-mux-pin="or-1.in2" cx="625.2" cy="333.8" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
      <circle data-mux-pin="or-1.out" cx="708" cy="320" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
    </g>
  </g>
  <g id="mux-pins">
    <circle data-mux-pin="task-card-1.inputInt1" cx="175" cy="188" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
    <circle data-mux-pin="task-card-1.inputInt2" cx="175" cy="388" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
    <circle data-mux-pin="task-card-1.inputInt3" cx="300" cy="80" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
    <circle data-mux-pin="task-card-1.outputInt" cx="800" cy="288" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  </g>
  <script type="text/javascript"><![CDATA[
  (function () {
    var KEY = "compact", SCALE = 0.6, NS = "http://www.w3.org/2000/svg";
    function svg(){return document.querySelector("svg");}
    function rootInv(){try{return svg().getScreenCTM().inverse();}catch(e){return null;}}
    function toRoot(x,y,el){var s=svg(),pt=s.createSVGPoint();pt.x=x;pt.y=y;var m;try{m=el.getScreenCTM();}catch(e){m=null;}if(!m)return[x,y];var p=pt.matrixTransform(m),r=rootInv();if(r)p=p.matrixTransform(r);return[p.x,p.y];}
    function dotCenter(id){var r=document.querySelector('[data-mux-comp][data-id="'+id+'"]');if(!r)return null;var bb;try{bb=r.getBBox();}catch(e){return null;}return toRoot(bb.x+bb.width/2,bb.y+bb.height/2,r);}
    function collect(){var comps=[];var dots=document.querySelectorAll('[data-mux-comp][data-id]');for(var i=0;i<dots.length;i++){var id=dots[i].getAttribute('data-id');var c=dotCenter(id);if(c)comps.push({id:id,x:c[0],y:c[1]});}return {key:KEY,components:comps};}
    function send(){try{if(window.parent&&window.parent!==window)window.parent.postMessage({__muxSolutionLayout:true,payload:collect()},"*");}catch(e){}}
    function boot(){send();setTimeout(send,120);setTimeout(send,500);}
    if(document.readyState==="loading")window.addEventListener("DOMContentLoaded",boot);else boot();
    window.addEventListener("load",send);
  })();
  ]]></script>
</svg>
