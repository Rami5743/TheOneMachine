  <script
     type="text/javascript"
     id="script15"><![CDATA[
  (function () {
    var KEY = "compact";
    function svg(){return document.querySelector("svg");}
    function rootInv(){try{return svg().getScreenCTM().inverse();}catch(e){return null;}}
    function toRoot(x,y,el){var s=svg(),pt=s.createSVGPoint();pt.x=x;pt.y=y;var m;try{m=el.getScreenCTM();}catch(e){m=null;}if(!m)return[x,y];var p=pt.matrixTransform(m),r=rootInv();if(r)p=p.matrixTransform(r);return[p.x,p.y];}
    function dotCenter(el){var bb;try{bb=el.getBBox();}catch(e){return null;}return toRoot(bb.x+bb.width/2,bb.y+bb.height/2,el);}
    function collect(){var out=[];var dots=document.querySelectorAll('[data-mux-comp][data-id]');for(var i=0;i<dots.length;i++){var c=dotCenter(dots[i]);if(c)out.push({id:dots[i].getAttribute('data-id'),x:c[0],y:c[1]});}return {key:KEY,components:out};}
    function send(){try{if(window.parent&&window.parent!==window)window.parent.postMessage({__muxSolutionLayout:true,payload:collect()},"*");}catch(e){}}
    function boot(){send();setTimeout(send,120);setTimeout(send,500);}
    if(document.readyState==="loading")window.addEventListener("DOMContentLoaded",boot);else boot();
    window.addEventListener("load",send);
  })();
  ]]></script>
