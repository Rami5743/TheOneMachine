  <!-- gate and-1 -->
  <image class="mux-gate-art" data-gate-id="and-1" href="../components/gate-and.svg" x="460.4" y="208.8" width="92.4" height="62.4"/>
  <rect data-mux-comp="1" data-id="and-1" data-type="gate-And" x="496" y="236" width="8" height="8" fill="#e0392b" fill-opacity="0.55"/>
  <circle class="mux-pin" data-mux-pin="and-1.in1" cx="462.8" cy="226.2" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <circle class="mux-pin" data-mux-pin="and-1.in2" cx="462.8" cy="253.8" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <circle class="mux-pin" data-mux-pin="and-1.out" cx="539.6" cy="240" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <!-- gate and-2 -->
  <image class="mux-gate-art" data-gate-id="and-2" href="../components/gate-and.svg" x="460.4" y="378.8" width="92.4" height="62.4"/>
  <rect data-mux-comp="1" data-id="and-2" data-type="gate-And" x="496" y="406" width="8" height="8" fill="#e0392b" fill-opacity="0.55"/>
  <circle class="mux-pin" data-mux-pin="and-2.in1" cx="462.8" cy="396.2" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <circle class="mux-pin" data-mux-pin="and-2.in2" cx="462.8" cy="423.8" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <circle class="mux-pin" data-mux-pin="and-2.out" cx="539.6" cy="410" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <!-- gate or-1 -->
  <image class="mux-gate-art" data-gate-id="or-1" href="../components/gate-or.svg" x="620.4" y="288.8" width="92.4" height="62.4"/>
  <rect data-mux-comp="1" data-id="or-1" data-type="gate-Or" x="656" y="316" width="8" height="8" fill="#e0392b" fill-opacity="0.55"/>
  <circle class="mux-pin" data-mux-pin="or-1.in1" cx="625.2" cy="306.2" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <circle class="mux-pin" data-mux-pin="or-1.in2" cx="625.2" cy="333.8" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <circle class="mux-pin" data-mux-pin="or-1.out" cx="708" cy="320" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <!-- CARD PIN SNAP DOTS -->
  <circle class="mux-pin" data-mux-pin="task-card-1.inputInt1" cx="175" cy="188" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <circle class="mux-pin" data-mux-pin="task-card-1.inputInt2" cx="175" cy="388" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <circle class="mux-pin" data-mux-pin="task-card-1.inputInt3" cx="300" cy="80" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <circle class="mux-pin" data-mux-pin="task-card-1.outputInt" cx="800" cy="288" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <script type="text/javascript"><![CDATA[
  (function () {
    var KEY = "compact";
    function svg(){return document.querySelector("svg");}
    function rootInv(){try{return svg().getScreenCTM().inverse();}catch(e){return null;}}
    function toRoot(x,y,el){var s=svg(),pt=s.createSVGPoint();pt.x=x;pt.y=y;var m;try{m=el.getScreenCTM();}catch(e){m=null;}if(!m)return[x,y];var p=pt.matrixTransform(m),r=rootInv();if(r)p=p.matrixTransform(r);return[p.x,p.y];}
    function dotCenter(el){var bb;try{bb=el.getBBox();}catch(e){return null;}return toRoot(bb.x+bb.width/2,bb.y+bb.height/2,el);}
    function collect(){var out=[];var dots=document.querySelectorAll('[data-mux-comp][data-id]');for(var i=0;i<dots.length;i++){var c=dotCenter(dots[i]);if(c)out.push({id:dots[i].getAttribute('data-id'),x:c[0],y:c[1]});}return {key:KEY,components:out};}
    function send(){try{if(window.parent&&window.parent!==window)window.parent.postMessage({__muxSolutionLayout:true,payload:collect()},"*");}catch(e){}}
    function boot(){send();setTimeout(send,120);setTimeout(send,500);}
    if(document.readyState==="loading")window.addEventListener("DOMContentLoaded",boot);else boot();
    window.addEventListener("load",send);
  })();
  ]]></script>
</svg>
