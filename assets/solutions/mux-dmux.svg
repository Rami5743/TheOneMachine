       the position the app reads). Blue dots are pin snap targets. -->
  <sodipodi:namedview id="namedview1" inkscape:snap-global="true" inkscape:snap-nodes="true" inkscape:object-nodes="true" inkscape:snap-center="true" inkscape:snap-bbox="true" inkscape:bbox-nodes="true"/>
