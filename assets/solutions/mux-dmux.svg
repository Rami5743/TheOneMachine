  <image class="mux-gate-art" data-gate-id="and-2" href="../components/gate-and.svg" x="520.4" y="356.8" width="92.4" height="62.4"/>
  <rect data-mux-comp="1" data-id="and-2" data-type="gate-And" x="556" y="384" width="8" height="8" fill="#e0392b" fill-opacity="0.55"/>
