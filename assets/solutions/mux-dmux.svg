  <rect x="150" y="60" width="700" height="456" rx="18" fill="#8a6f45" fill-opacity="1" stroke="rgba(245,235,215,0.92)" stroke-width="3" id="card-frame"/>
  <text x="500" y="48" text-anchor="middle" fill="#f6ead7" font-family="sans-serif" font-size="28" font-weight="800" id="card-title">DMUX</text>
  <line x1="125" y1="288" x2="175" y2="288" stroke="#111" stroke-width="5" stroke-linecap="round" id="stub-data"/>
  <line x1="300" y1="40" x2="300" y2="80" stroke="#111" stroke-width="5" stroke-linecap="round" id="stub-ctrl"/>
  <line x1="800" y1="188" x2="875" y2="188" stroke="#111" stroke-width="5" stroke-linecap="round" id="stub-out1"/>
  <line x1="800" y1="388" x2="875" y2="388" stroke="#111" stroke-width="5" stroke-linecap="round" id="stub-out2"/>
  <text x="300" y="28" text-anchor="middle" fill="#f6ead7" font-family="sans-serif" font-size="22" font-weight="800" id="lbl-ctrl">בקרה</text>
  <text x="892" y="194" text-anchor="start" fill="#f6ead7" font-family="sans-serif" font-size="22" font-weight="800" id="lbl-1">1</text>
  <text x="892" y="394" text-anchor="start" fill="#f6ead7" font-family="sans-serif" font-size="22" font-weight="800" id="lbl-2">2</text>
  <image href="../components/source.svg" x="9" y="238" width="92" height="100" id="source-img"/>
  <image href="../components/lamp-off.svg" x="885" y="58" width="110" height="140" id="lamp-img-1"/>
  <image href="../components/lamp-off.svg" x="885" y="258" width="110" height="140" id="lamp-img-2"/>
  <!-- WIRES -->
  <path class="mux-wire" data-mux-wire="1" d="M 300,80 364,120" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire1"/>
  <path class="mux-wire" data-mux-wire="1" d="M 448,120 522.8,174.2" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire2"/>
  <path class="mux-wire" data-mux-wire="1" d="M 175,288 522.8,201.8" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire3"/>
  <path class="mux-wire" data-mux-wire="1" d="M 599.6,188 800,188" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire4"/>
  <path class="mux-wire" data-mux-wire="1" d="M 300,80 522.8,374.2" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire5"/>
  <path class="mux-wire" data-mux-wire="1" d="M 175,288 522.8,401.8" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire6"/>
  <path class="mux-wire" data-mux-wire="1" d="M 599.6,388 800,388" style="fill:none;stroke:#101010;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" id="wire7"/>
  <!-- GATES -->
  <!-- gate not-c -->
  <image class="mux-gate-art" data-gate-id="not-c" href="../components/gate-not.svg" x="360.4" y="88.8" width="92.4" height="62.4"/>
  <rect data-mux-comp="1" data-id="not-c" data-type="gate-Not" x="396" y="116" width="8" height="8" fill="#e0392b" fill-opacity="0.55"/>
  <circle class="mux-pin" data-mux-pin="not-c.in1" cx="364" cy="120" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
  <circle class="mux-pin" data-mux-pin="not-c.out" cx="448" cy="120" r="3.5" fill="#2b7fe0" fill-opacity="0.5"/>
